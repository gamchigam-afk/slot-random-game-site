<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 슬롯 머신</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}
h1{margin-top:30px;}
#money{font-size:30px;margin:20px;}
.slot{
    display:inline-flex;
    width:100px;
    height:100px;
    align-items:center;
    justify-content:center;
    font-size:50px;
    border:3px solid white;
    margin:10px;
    background:#222;
}
button{
    font-size:25px;
    padding:15px 30px;
    cursor:pointer;
}
#result{
    font-size:30px;
    margin-top:20px;
    min-height:70px;
}
</style>
</head>
<body>

<h1>🎰 SLOT MACHINE 🎰</h1>

<div id="money">💰 10000</div>

<div>
    <div class="slot" id="s1">❓</div>
    <div class="slot" id="s2">❓</div>
    <div class="slot" id="s3">❓</div>
</div>

<br>

<button id="spinBtn" onclick="spin()">SPIN</button>

<div id="result"></div>

<script>

let money = 10000;
let spinning = false;

const symbols = ["🍒","🍋","⭐","💎","7️⃣"];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function ding(freq){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    osc.type = "sine";

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.15
    );

    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function updateMoney(){
    document.getElementById("money").innerText =
    "💰 " + money;
}

function spin(){

    if(spinning) return;

    if(money < 100){
        document.getElementById("result").innerText =
        "💸 돈 부족!";
        return;
    }

    spinning = true;

    money -= 100;
    updateMoney();

    document.getElementById("result").innerText =
    "🎰 돌리는 중...";

    const s1 = document.getElementById("s1");
    const s2 = document.getElementById("s2");
    const s3 = document.getElementById("s3");

    const final1 =
        symbols[Math.floor(Math.random()*symbols.length)];
    const final2 =
        symbols[Math.floor(Math.random()*symbols.length)];
    const final3 =
        symbols[Math.floor(Math.random()*symbols.length)];

    const rolling = setInterval(()=>{

        s1.innerText =
        symbols[Math.floor(Math.random()*symbols.length)];

        s2.innerText =
        symbols[Math.floor(Math.random()*symbols.length)];

        s3.innerText =
        symbols[Math.floor(Math.random()*symbols.length)];

    },100);

    setTimeout(()=>{
        s1.innerText = final1;
        ding(500);
    },2000);

    setTimeout(()=>{
        s2.innerText = final2;
        ding(700);
    },2500);

    setTimeout(()=>{

        clearInterval(rolling);

        s3.innerText = final3;
        ding(1000);

        const jackpot =
            (final1 === final2 &&
             final2 === final3);

        if(jackpot){

            money += 3000;

            document.getElementById("result").innerHTML =
            "🎉 JACKPOT 🎉<br>+3000";

        }else{

            document.getElementById("result").innerText =
            "❌ FAIL";
        }

        updateMoney();
        spinning = false;

    },3000);
}
</script>

</body>
</html>
