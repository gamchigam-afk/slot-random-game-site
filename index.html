<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🎰 슬롯머신 (돈 저장 시스템)</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-top: 30px;
}

.slot {
    font-size: 60px;
    margin: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
}

#money {
    font-size: 28px;
    margin-top: 10px;
}

#result {
    font-size: 20px;
    margin-top: 15px;
    color: yellow;
}
</style>
</head>

<body>

<h1>🎰 슬롯머신</h1>

<div id="money">돈: 1000원</div>

<div class="slot" id="slot">❓ ❓ ❓</div>

<button onclick="spin()">돌리기 (100원)</button>
<button onclick="resetMoney()">돈 초기화</button>

<div id="result"></div>

<script>
// 저장 키
const SAVE_KEY = "slot_money";

// 돈 불러오기
let money = Number(localStorage.getItem(SAVE_KEY));

if (isNaN(money)) {
    money = 1000;
}

// UI 업데이트
function updateUI() {
    document.getElementById("money").innerText = "돈: " + money + "원";
    localStorage.setItem(SAVE_KEY, money);
}

updateUI();

// 슬롯 아이템
const items = ["🍒", "🍋", "🍇", "🔔", "⭐", "7️⃣"];

function spin() {
    if (money < 100) {
        document.getElementById("result").innerText = "돈이 부족해!";
        return;
    }

    money -= 100;

    let a = items[Math.floor(Math.random() * items.length)];
    let b = items[Math.floor(Math.random() * items.length)];
    let c = items[Math.floor(Math.random() * items.length)];

    document.getElementById("slot").innerText = `${a} ${b} ${c}`;

    // 당첨 조건
    if (a === b && b === c) {
        let win = 1000;
        money += win;
        document.getElementById("result").innerText = "잭팟! +1000원 🎉";
    } 
    else if (a === b || b === c || a === c) {
        let win = 300;
        money += win;
        document.getElementById("result").innerText = "+300원!";
    } 
    else {
        document.getElementById("result").innerText = "꽝 😭";
    }

    updateUI();
}

// 돈 초기화
function resetMoney() {
    money = 1000;
    updateUI();
    document.getElementById("result").innerText = "초기화 완료!";
}
</script>

</body>
</html>
