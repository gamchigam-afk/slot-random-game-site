<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Slot</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #ffd700;
    font-family: Arial;
    text-align: center;
}

/* 타이틀 */
h1 {
    margin-top: 30px;
    font-size: 40px;
    text-shadow: 0 0 10px gold;
}

/* 돈 UI */
#money {
    font-size: 26px;
    margin-top: 10px;
    color: #fff;
}

/* 슬롯 머신 프레임 */
.slot-container {
    margin: 30px auto;
    width: 320px;
    padding: 20px;
    border: 6px solid #ffd700;
    border-radius: 15px;
    background: linear-gradient(#222, #000);
    box-shadow: 0 0 25px gold;
}

/* 슬롯 */
.slot {
    font-size: 60px;
    letter-spacing: 10px;
    padding: 15px;
    background: #111;
    border: 3px inset gold;
    border-radius: 10px;
}

/* 버튼 */
button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: linear-gradient(gold, #caa300);
    color: black;
    font-weight: bold;
    box-shadow: 0 0 10px gold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* 결과 */
#result {
    margin-top: 15px;
    font-size: 20px;
    color: #fff;
    text-shadow: 0 0 5px black;
}
</style>
</head>

<body>

<h1>🎰 CASINO SLOT</h1>

<div id="money">💰 1000원</div>

<div class="slot-container">
    <div class="slot" id="slot">❓ ❓ ❓</div>
</div>

<button onclick="spin()" id="btn">🎲 SPIN</button>
<button onclick="resetMoney()">RESET</button>

<div id="result"></div>

<script>
const SAVE_KEY = "casino_money";

let money = Number(localStorage.getItem(SAVE_KEY));
if (isNaN(money)) money = 1000;

const items = ["🍒", "🍋", "🍇", "🔔", "⭐", "7️⃣"];

let spinning = false;

function updateUI() {
    document.getElementById("money").innerText = "💰 " + money + "원";
    localStorage.setItem(SAVE_KEY, money);
}

updateUI();

function spin() {
    if (spinning) return;
    if (money < 100) {
        document.getElementById("result").innerText = "돈이 부족합니다 💸";
        return;
    }

    spinning = true;
    money -= 100;
    updateUI();

    let slot = document.getElementById("slot");
    let btn = document.getElementById("btn");

    btn.disabled = true;
    document.getElementById("result").innerText = "🎰 SPINNING...";

    // 돌아가는 애니메이션
    let interval = setInterval(() => {
        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];
        slot.innerText = `${a} ${b} ${c}`;
    }, 80);

    setTimeout(() => {
        clearInterval(interval);

        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];

        slot.innerText = `${a} ${b} ${c}`;

        // 🎯 3개 같을 때만 잭팟
        if (a === b && b === c) {
            money += 1000;
            document.getElementById("result").innerText = "🎉 JACKPOT! +1000원";
            document.body.style.boxShadow = "0 0 40px gold";
            setTimeout(() => document.body.style.boxShadow = "none", 300);
        } else {
            document.getElementById("result").innerText = "😢 LOSE";
        }

        updateUI();
        btn.disabled = false;
        spinning = false;

    }, 2500);
}

function resetMoney() {
    money = 1000;
    updateUI();
    document.getElementById("result").innerText = "RESET 완료";
}
</script>

</body>
</html>
