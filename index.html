<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 CASINO NEON ULTIMATE</title>

<style>

/* 🌌 BACKGROUND */
body{
    margin:0;
    font-family:Arial;
    color:gold;
    background: radial-gradient(circle at top,#2a2a2a,#000 70%);
    overflow:hidden;
}

/* ✨ 반짝 */
body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    top:0;left:0;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(gold 1px, transparent 1px);
    background-size:60px 60px,120px 120px;
    animation:sparkle 6s linear infinite;
    opacity:0.12;
    pointer-events:none;
}

@keyframes sparkle{
    0%{transform:translateY(0);}
    100%{transform:translateY(-60px);}
}

/* 🧱 APP LAYOUT */
#app{
    display:grid;
    grid-template-columns: 140px 1fr 140px;
    height:100vh;
}

/* 💰 TOP BAR */
#topBar{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
}

#money{
    color:white;
}

#bestScore{
    color:gold;
}

/* 🎴 CARD */
.card{
    background:#111;
    border:1px solid gold;
    border-radius:12px;
    padding:12px;
    margin:10px;
    cursor:pointer;
    transition:0.2s;
    color:gold;
    text-align:center;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px gold;
}

/* 🧭 LEFT PANEL */
#leftPanel{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:10px;
}

/* 🧭 RIGHT PANEL */
#rightPanel{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:10px;
}

/* 🎮 CENTER */
#center{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 🎰 SLOT */
.slot-box{
    font-size:60px;
    padding:20px;
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    box-shadow:0 0 15px gold;
}

.coin{
    font-size:80px;
}

/* 📊 MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modalBox{
    background:#111;
    border:2px solid gold;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 25px gold;
    color:gold;
    width:300px;
    text-align:center;
}

.screen{display:none;}
.active{display:flex;}

</style>
</head>

<body>

<!-- 💰 TOP -->
<div id="topBar">
    <div id="money">💰 1000</div>
    <div id="bestScore">🏆 BEST: 0</div>
</div>

<!-- 🧱 APP -->
<div id="app">

<!-- LEFT -->
<div id="leftPanel">

<div class="card" onclick="openMini()">🎮 MINI</div>
<div class="card" onclick="openOdds()">📊 ODDS</div>
<div class="card" onclick="openInventory()">🎒 INV</div>

</div>

<!-- CENTER -->
<div id="center">

<div id="welcome" class="screen active">
    <h1>🎰 CASINO NEON</h1>
    <div class="card" onclick="goMode()">🎮 GAME MODE</div>
</div>

<div id="mode" class="screen">
    <h2>🎮 GAME MODE</h2>
    <div class="card" onclick="openSlot()">🎰 SLOT</div>
    <div class="card" onclick="openCoin()">🪙 COIN</div>
    <div class="card" onclick="openBet()">💰 BET</div>
    <div class="card" onclick="goWelcome()">🚪 BACK</div>
</div>

<div id="slot" class="screen">
    <h2>🎰 SLOT</h2>
    <div class="slot-box" id="slotBox">❓❓❓</div>
    <div class="card" onclick="spin()">SPIN (100)</div>
    <div class="card" onclick="goMode()">BACK</div>
</div>

<div id="coin" class="screen">
    <h2>🪙 COIN</h2>
    <div class="coin" id="coinFace">❓</div>
    <div class="card" onclick="flip('HEAD')">HEAD</div>
    <div class="card" onclick="flip('TAIL')">TAIL</div>
    <div class="card" onclick="goMode()">BACK</div>
</div>

<div id="bet" class="screen">
    <h2>💰 BET</h2>
    <input id="betAmount" type="number" placeholder="BET">
    <div class="card" onclick="playBet()">START</div>
    <div class="card" onclick="goMode()">BACK</div>
</div>

</div>

<!-- RIGHT -->
<div id="rightPanel"></div>

</div>

<!-- 📊 MODAL -->
<div id="oddsModal" class="modal">
    <div class="modalBox">
        <h2>📊 확률표</h2>
        <p>🎰 SLOT: JACKPOT 3%</p>
        <p>🪙 COIN: 50%</p>
        <p>💰 BET: 50%</p>
        <p>🎮 MINI: REACTION</p>
        <button onclick="closeOdds()">닫기</button>
    </div>
</div>

<script>

let money=1000;
let best=0;

function update(){
    document.getElementById("money").innerText="💰 "+money;
    document.getElementById("bestScore").innerText="🏆 BEST: "+best;
}

/* 화면 */
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goWelcome(){show("welcome");}
function goMode(){show("mode");}

function openSlot(){show("slot");}
function openCoin(){show("coin");}
function openBet(){show("bet");}

/* 🎰 SLOT */
function spin(){
    if(money<100) return;
    money-=100;

    let box=document.getElementById("slotBox");

    let anim=setInterval(()=>{
        box.innerText="🍒 🍋 🍇";
    },80);

    setTimeout(()=>{
        clearInterval(anim);

        if(Math.random()<0.03){
            money+=1000;
        }

        update();
    },1500);
}

/* 🪙 COIN */
function flip(c){
    if(money<50) return;
    money-=50;

    let res=Math.random()<0.5?"HEAD":"TAIL";
    document.getElementById("coinFace").innerText=res;

    if(c===res) money+=100;

    update();
}

/* 💰 BET */
function playBet(){
    let bet=Number(document.getElementById("betAmount").value);
    if(bet>money) return;

    money-=bet;

    if(Math.random()<0.5) money+=bet*2;

    update();
}

/* 📊 MODAL */
function openOdds(){
    document.getElementById("oddsModal").style.display="flex";
}

function closeOdds(){
    document.getElementById("oddsModal").style.display="none";
}

/* ETC */
function openMini(){alert("MINI 준비중");}
function openInventory(){alert("INV 준비중");}

update();

</script>

</body>
</html>
