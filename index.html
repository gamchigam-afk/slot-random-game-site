<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🎰 슬롯머신</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-top: 30px;
}

.slot {
    font-size: 70px;
    margin: 20px;
    letter-spacing: 10px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}

#money {
    font-size: 28px;
    margin-top: 10px;
}

#result {
    font-size: 20px;
    margin-top: 15px;
    color: yellow;
}
</style>
</head>

<body>

<h1>🎰 슬롯머신</h1>

<div id="money">돈: 1000원</div>

<div class="slot" id="slot">❓ ❓ ❓</div>

<button onclick="spin()" id="btn">돌리기 (100원)</button>
<button onclick="resetMoney()">돈 초기화</button>

<div id="result"></div>

<script>
const SAVE_KEY = "slot_money";

let money = Number(localStorage.getItem(SAVE_KEY));
if (isNaN(money)) money = 1000;

const items = ["🍒", "🍋", "🍇", "🔔", "⭐", "7️⃣"];

let spinning = false;

function updateUI() {
    document.getElementById("money").innerText = "돈: " + money + "원";
    localStorage.setItem(SAVE_KEY, money);
}

updateUI();

function spin() {
    if (spinning) return;
    if (money < 100) {
        document.getElementById("result").innerText = "돈 부족!";
        return;
    }

    spinning = true;
    money -= 100;
    updateUI();

    document.getElementById("result").innerText = "돌리는 중... 🎰";

    let slot = document.getElementById("slot");
    let btn = document.getElementById("btn");

    btn.disabled = true;

    // 돌아가는 애니메이션
    let interval = setInterval(() => {
        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];
        slot.innerText = `${a} ${b} ${c}`;
    }, 100);

    // 2.5초 후 멈춤
    setTimeout(() => {
        clearInterval(interval);

        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];

        slot.innerText = `${a} ${b} ${c}`;

        // 🎯 규칙: 3개 같을 때만 잭팟
        if (a === b && b === c) {
            money += 1000;
            document.getElementById("result").innerText = "🎉 잭팟! +1000원";
        } else {
            document.getElementById("result").innerText = "꽝 😭";
        }

        updateUI();
        btn.disabled = false;
        spinning = false;

    }, 2500);
}

function resetMoney() {
    money = 1000;
    updateUI();
    document.getElementById("result").innerText = "초기화 완료!";
}
</script>

</body>
</html>
