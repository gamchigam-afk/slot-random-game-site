<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
text-shadow:0 0 10px #00ffff;
}

/* ================= WINDOW SYSTEM ================= */

.window{
position:absolute;
width:100%;
height:100vh;
top:0;
left:0;

opacity:0;
transform:scale(0.95);
pointer-events:none;

transition:0.35s ease;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.window.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* ================= TITLE ================= */

.title{
font-size:60px;
animation:blink 1.5s infinite;
}

.beta{
font-size:14px;
margin-left:8px;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* ================= BUTTON ================= */

.card{
padding:10px 15px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

/* ================= SIDE MENU ================= */

.side{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
}

</style>
</head>

<body>

<!-- ================= SIDE BUTTONS (ALL WINDOWS) ================= -->

<div class="side">

<div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
<div class="card" onclick="UI.go('inventory')">🎒 INVENTORY</div>
<div class="card" onclick="UI.go('mini')">🎮 MINI GAME</div>
<div class="card" onclick="UI.go('mode')">🎰 MODE</div>

</div>

<!-- ================= WELCOME ================= -->

<div class="window active" id="welcome">

<div class="title">
NEON CASINO X <span class="beta">BETA</span>
</div>

<div class="card" onclick="UI.go('mode')">
START GAME
</div>

</div>

<!-- ================= MODE ================= -->

<div class="window" id="mode">

<div class="card" onclick="UI.go('slot')">SLOT GAME</div>
<div class="card" onclick="UI.go('coin')">COIN GAME</div>
<div class="card" onclick="UI.go('bet')">BET GAME</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- ================= SLOT ================= -->

<div class="window" id="slot">

<h2>SLOT MACHINE</h2>
<div id="slotBox">❓❓❓</div>

<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= COIN ================= -->

<div class="window" id="coin">

<h2>COIN FLIP</h2>
<div id="coinBox">❓</div>

<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= BET ================= -->

<div class="window" id="bet">

<h2>BET GAME</h2>
<input id="betInput">

<div class="card" onclick="bet()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= SHOP ================= -->

<div class="window" id="shop">

<h2>SHOP</h2>

<div class="card">SLOT BOOST</div>
<div class="card">COIN BOOST</div>
<div class="card">BET BOOST</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- ================= INVENTORY ================= -->

<div class="window" id="inventory">

<h2>INVENTORY</h2>

<div>EMPTY</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- ================= MINI GAME ================= -->

<div class="window" id="mini">

<h2>REACTION GAME</h2>

<div id="miniText">WAIT...</div>

<div class="card" onclick="miniClick()">CLICK</div>
<div class="card" onclick="miniReset()">RESET</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- ================= JS ================= -->

<script>

/* ================= UI ================= */

const UI={
current:"welcome",

go(id){

document.getElementById(this.current)
.classList.remove("active");

document.getElementById(id)
.classList.add("active");

this.current=id;

}
};

/* ================= SLOT ================= */

function spin(){
document.getElementById("slotBox").innerText="SPIN...";
setTimeout(()=>{
document.getElementById("slotBox").innerText=
Math.random()<0.3?"WIN":"LOSE";
},800);
}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
document.getElementById("coinBox").innerText=r;
}

/* ================= BET ================= */

function bet(){
let v=document.getElementById("betInput").value;
alert("BET: "+v);
}

/* ================= MINI GAME ================= */

let mini=0;

function miniStart(){
mini=1;
document.getElementById("miniText").innerText="지금!";
setTimeout(()=>{
if(mini===1){
document.getElementById("miniText").innerText="실패";
mini=0;
}
},2000);
}

function miniClick(){

if(mini===0){
document.getElementById("miniText").innerText="실격!";
return;
}

let t=Date.now()%1000;

if(t<300){
document.getElementById("miniText").innerText="50원!";
}
else if(t<500){
document.getElementById("miniText").innerText="25원!";
}
else{
document.getElementById("miniText").innerText="실패";
}

mini=0;
}

function miniReset(){
document.getElementById("miniText").innerText="WAIT...";
setTimeout(miniStart,800);
}

setTimeout(miniStart,1000);

</script>

</body>
</html>
