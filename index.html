<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Service Terminated</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .box {
        animation: flicker 1.5s infinite;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    p {
        font-size: 18px;
        opacity: 0.8;
    }

    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }

    .small {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.5;
    }
</style>
</head>

<body>

<div class="box">
    <h1>⚠ SERVICE TERMINATED ⚠</h1>
    <p>SERVER CLOSED</p>
    <p>ALL DATA HAS BEEN ERASED</p>

    <div class="small">
        connection lost...<br>
        you can close this page
    </div>
</div>

</body>
</html>
