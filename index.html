<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X (BETA)</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* ================= MONEY ================= */

#moneyUI,#bestUI{
position:fixed;
left:50%;
transform:translateX(-50%);
z-index:10;
}

#moneyUI{top:10px;font-size:22px;}
#bestUI{top:40px;font-size:16px;color:gold;}

/* ================= TITLE ================= */

#title{
font-size:60px;
margin-top:60px;
text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
}

/* ================= SCREEN (FULL PAGE SYSTEM) ================= */

.screen{
display:none;
position:fixed;
inset:0;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
}

.active{display:flex;}

/* ================= CARD ================= */

.card{
padding:10px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
}

/* ================= GOLD ================= */

#gold{
font-size:100px;
cursor:pointer;
user-select:none;
transition:0.1s;
}

.shrink{transform:scale(0.7);}

/* ================= SLOT ================= */

#slotBox{
font-size:70px;
margin:20px;
}

.small{font-size:14px;color:gray;}

</style>
</head>

<body>

<div id="moneyUI">💰 50000</div>
<div id="bestUI">🏆 50000</div>

<div id="title">NEON CASINO X (BETA)</div>

<!-- ================= MENU ================= -->
<div id="menu" class="screen active">

<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('mine')">GOLD MINE</div>

</div>

<!-- ================= SLOT ================= -->
<div id="slot" class="screen">

<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="small" id="slotFail"></div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= COIN ================= -->
<div id="coin" class="screen">

<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= BET ================= -->
<div id="bet" class="screen">

<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= GOLD MINE (FULL SCREEN GAME) ================= -->
<div id="mine" class="screen">

<h2>⛏️ GOLD MINE</h2>

<div id="gold">🪙</div>

<div id="mineText">CLICK AND MINE</div>

<div class="card" onclick="go('menu')">EXIT</div>

</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000
};

/* ================= UI ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
}

function render(){
moneyUI.innerText="💰 "+State.money;
bestUI.innerText="🏆 "+State.best;
}

/* ================= SLOT ================= */

const sym=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){

sub(100);

let box=slotBox;
let i=0;

let inter=setInterval(()=>{

box.innerText=
sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)];

i++;

if(i>15){
clearInterval(inter);

let a=sym[Math.floor(Math.random()*5)];
let b=sym[Math.floor(Math.random()*5)];
let c=sym[Math.floor(Math.random()*5)];

box.innerText=`${a} ${b} ${c}`;

if(a===b&&b===c){
add(1000);
slotFail.innerText="";
}
else{
slotFail.innerText="FAIL";
sub(200);
}

}

},70);

}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
coinBox.innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;
sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= GOLD MINE ================= */

const gold=document.getElementById("gold");

let mining=false;
let mineTimer=null;
let cooldown=false;

gold.onmousedown=()=>{

if(cooldown) return;

mining=true;
mineText.innerText="MINING...";

let t=0;

mineTimer=setInterval(()=>{

if(!mining){
clearInterval(mineTimer);
return;
}

add(10);

t++;

if(t>=1000){
stopMine();
}

},10);

};

function stopMine(){

mining=false;
clearInterval(mineTimer);

mineText.innerText="COOLDOWN";

cooldown=true;

setTimeout(()=>{
cooldown=false;
mineText.innerText="READY";
},5000);

}

gold.onmouseup=stopMine;
gold.onmouseleave=stopMine;

</script>

</body>
</html>
