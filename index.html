<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
text-shadow:0 0 10px #00ffff;
}

/* ================= MONEY UI ================= */

#ui{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
text-align:center;
z-index:999;
}

#moneyUI{
font-size:24px;
color:#00ffff;
}

#bestUI{
font-size:18px;
color:gold;
}

/* ================= WINDOW ================= */

.window{
position:absolute;
width:100%;
height:100vh;
top:0;
left:0;

opacity:0;
transform:scale(0.95);
pointer-events:none;

transition:0.35s ease;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.window.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* ================= BUTTON ================= */

.card{
padding:10px 15px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

#slotBox{
font-size:70px;
margin:20px;
letter-spacing:10px;
}

.spinning{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- ================= MONEY UI ================= -->

<div id="ui">
<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 1000</div>
</div>

<!-- ================= WELCOME ================= -->

<div class="window active" id="welcome">

<div class="card" onclick="UI.go('mode')">
START GAME
</div>

</div>

<!-- ================= MODE ================= -->

<div class="window" id="mode">

<div class="card" onclick="UI.go('slot')">SLOT GAME</div>
<div class="card" onclick="UI.go('coin')">COIN GAME</div>
<div class="card" onclick="UI.go('bet')">BET GAME</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- ================= SLOT ================= -->

<div class="window" id="slot">

<h2>SLOT MACHINE</h2>

<div id="slotBox">❓ ❓ ❓</div>

<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= COIN ================= -->

<div class="window" id="coin">

<h2>COIN FLIP</h2>
<div id="coinBox">❓</div>

<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= BET ================= -->

<div class="window" id="bet">

<h2>BET GAME</h2>
<input id="betInput">

<div class="card" onclick="bet()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<script>

/* ================= STATE ================= */

const State={
money:1000,
best:1000
};

/* ================= RENDER ================= */

function render(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best) State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0) State.money=0;
render();
}

render();

/* ================= UI ================= */

const UI={
current:"welcome",
go(id){
document.getElementById(this.current).classList.remove("active");
document.getElementById(id).classList.add("active");
this.current=id;
}
};

/* ================= SLOT (FIXED MOTION) ================= */

const symbols=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){

const box=document.getElementById("slotBox");

sub(100);

box.classList.add("spinning");

let count=0;

let interval=setInterval(()=>{

box.innerText=
symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)];

count++;

if(count>18){

clearInterval(interval);
box.classList.remove("spinning");

let final=
symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)];

box.innerText=final;

if(Math.random()<0.3){
add(500);
}else{
sub(0);
}

}

},70);

}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
document.getElementById("coinBox").innerText=r;

if(r===t) add(100);
}

/* ================= BET ================= */

function bet(){
let v=Number(document.getElementById("betInput").value);
if(!v||v>State.money) return;

sub(v);

setTimeout(()=>{
if(Math.random()<0.5){
add(v*2);
}
},600);
}

</script>

</body>
</html>
