<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#222,#000);
color:white;
overflow:hidden;
}

.screen{display:none;}
.active{display:flex;}

#center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

.card{
background:gold;
color:black;
padding:10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.card:hover{transform:scale(1.05);}

#top{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
text-align:center;
font-weight:bold;
}

#fx{
position:fixed;
top:50px;
right:20px;
}

.fx{animation:up 1s forwards;}

@keyframes up{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-20px);}
}

.plus{color:lime;}
.minus{color:red;}

.slot,.coin{
font-size:55px;
color:gold;
}

.flash{
animation:flash 0.4s;
}

@keyframes flash{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

#side{
position:fixed;
right:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
}

</style>
</head>

<body>

<div id="top">
<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 0</div>
</div>

<div id="fx"></div>

<div id="center">

<!-- WELCOME -->
<div id="welcome" class="screen active">
<h1 style="color:gold;">NEON CASINO X</h1>
<div class="card" onclick="UI.go('mode')">CHOOSE GAME MODE</div>
</div>

<!-- MODE -->
<div id="mode" class="screen">

<div class="card" onclick="UI.go('slot')">🎰 SLOT</div>
<div class="card" onclick="UI.go('coin')">🪙 COIN</div>
<div class="card" onclick="UI.go('bet')">💰 BET</div>

<div id="side">
<div class="card" onclick="UI.go('inventory')">🎒 INV</div>
<div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
<div class="card" onclick="UI.go('mini')">🎮 MINI</div>
<div class="card" onclick="UI.go('welcome')">BACK</div>
</div>

</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div class="slot">❓❓❓</div>
<div class="card" onclick="Game.spinStart()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div class="coin">❓</div>
<div class="card" onclick="Game.coin('HEAD')">HEAD</div>
<div class="card" onclick="Game.coin('TAIL')">TAIL</div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betInput">
<div class="card" onclick="Game.betPlay()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="card" onclick="Shop.buy('slot')">🎰 슬롯 +3% (2000)</div>
<div class="card" onclick="Shop.buy('coin')">🪙 코인 +3% (2000)</div>
<div class="card" onclick="Shop.buy('bet')">💰 베팅 +3% (2000)</div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- INVENTORY -->
<div id="inventory" class="screen">
<div id="invBox"></div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- MINI -->
<div id="mini" class="screen">
<h2 style="color:gold;">MINI GAME</h2>
<div class="card" id="miniText">WAIT...</div>
<div class="card" onclick="Mini.click()">CLICK</div>
<div class="card" onclick="Mini.reset()">RESET</div>
<div class="card" onclick="UI.go('mode')">BACK</div>
</div>

</div>

<script>

const State={
money:1000,
best:0,
inv:[],
equip:{},
timer:{}
}

/* FX */
function fx(v){
const box=document.getElementById("fx");
const d=document.createElement("div");
d.className="fx "+(v>=0?"plus":"minus");
d.innerText=(v>=0?"+":"")+v;
box.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

/* MONEY */
const Money={
add(v){State.money+=v;fx(v);Render.update();},
sub(v){State.money-=v;fx(-v);Render.update();}
}

/* UI (핵심 수정: 게임 화면 진입만 담당) */
const UI={
go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
}

/* SLOT (진짜 플레이 구조) */
const Game={

spinStart(){

if(State.money<100) return;
Money.sub(100);

const box=document.querySelector(".slot");
const arr=["🍒","🍋","🍇","💎","7️⃣"];

let count=0;
clearInterval(State.timer.slot);

State.timer.slot=setInterval(()=>{

box.innerText=
arr[Math.random()*5|0]+" "+
arr[Math.random()*5|0]+" "+
arr[Math.random()*5|0];

count++;

if(count>25){
clearInterval(State.timer.slot);

const win=Math.random()<0.03+(State.equip.slot?0.03:0);

if(win){
box.classList.add("flash");
setTimeout(()=>box.classList.remove("flash"),400);
Money.add(1000);
}else{
box.innerText="❌ FAIL";
}

}

},70);

},

coin(type){

if(State.money<50) return;
Money.sub(50);

const face=document.querySelector(".coin");
let count=0;

clearInterval(State.timer.coin);

State.timer.coin=setInterval(()=>{

face.innerText=Math.random()<0.5?"HEAD":"TAIL";
count++;

if(count>20){

clearInterval(State.timer.coin);

const r=Math.random()<0.5+(State.equip.coin?0.03:0)?"HEAD":"TAIL";
face.innerText=r;

if(r===type){
face.classList.add("flash");
setTimeout(()=>face.classList.remove("flash"),400);
Money.add(100);
}

}

},80);

},

betPlay(){

const v=Number(document.getElementById("betInput").value);
if(v>State.money) return;

Money.sub(v);

setTimeout(()=>{
if(Math.random()<0.5+(State.equip.bet?0.03:0)) Money.add(v*2);
},800);

}

}

/* SHOP */
const Shop={
buy(t){
if(State.money<2000) return;
Money.sub(2000);
State.inv.push(t);
Render.inv();
}
}

/* INVENTORY */
const Render={
inv(){
const box=document.getElementById("invBox");
box.innerHTML="";
State.inv.forEach((i,idx)=>{
const d=document.createElement("div");
d.className="card";
d.innerText=i+" 장착";
d.onclick=()=>{
State.equip[i]=true;
State.inv.splice(idx,1);
Render.inv();
};
box.appendChild(d);
});
},

update(){
State.best=Math.max(State.best,State.money);
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
}
}

/* MINI */
const Mini={
start(){
this.ready=false;
document.getElementById("miniText").innerText="WAIT...";
setTimeout(()=>{
this.ready=true;
this.time=Date.now();
document.getElementById("miniText").innerText="GO!";
},Math.random()*2000+1000);
},
click(){
if(!this.ready){
this.start();
return;
}
const t=(Date.now()-this.time)/1000;
if(t<=0.2) Money.add(100);
else if(t<=0.5) Money.add(50);
this.start();
},
reset(){this.start();}
}

Render.update();

</script>

</body>
</html>
