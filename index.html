<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
background:radial-gradient(circle,#111,#000);
color:#00ffff;
font-family:Arial;
height:100vh;
overflow:hidden;
text-shadow:0 0 10px #00ffff;
}

/* ================= TITLE ================= */

.titleWrap{
text-align:center;
margin-top:80px;
}

.title{
font-size:70px;
text-shadow:0 0 20px #00ffff,0 0 40px #00ffff;
animation:blink 1.5s infinite;
display:inline-block;
}

.beta{
font-size:16px;
margin-left:10px;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
vertical-align:top;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* ================= UI ================= */

.screen{display:none;}

.card{
padding:10px 15px;
margin:5px;
border:1px solid #00ffff;
cursor:pointer;
transition:.2s;
box-shadow:0 0 10px #00ffff;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* ================= SIDE MENU ================= */

.sideMenu{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
}

/* ================= MODE CARDS ================= */

.modeCard{
width:260px;
padding:15px;
border:2px solid #00ffff;
margin:10px;
box-shadow:0 0 20px #00ffff;
}

.modeCard button{
margin-top:10px;
background:#00ffff;
border:none;
padding:5px 10px;
font-weight:bold;
cursor:pointer;
}

/* ================= TOP ================= */

#moneyUI,#bestUI{
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<!-- ================= TITLE ================= -->

<div class="titleWrap">

  <div class="title">
    NEON CASINO X
    <span class="beta">BETA</span>
  </div>

  <div>CHOOSE GAME MODE</div>

</div>

<!-- ================= TOP UI ================= -->

<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 1000</div>

<!-- ================= SIDE MENU ================= -->

<div class="sideMenu">

  <div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
  <div class="card" onclick="UI.go('inventory')">🎒 INVENTORY</div>

</div>

<!-- ================= WELCOME ================= -->

<div id="welcome" class="screen" style="display:flex;flex-direction:column;align-items:center;">

  <div class="card" onclick="UI.go('mode')">
    START GAME
  </div>

</div>

<!-- ================= MODE ================= -->

<div id="mode" class="screen" style="display:flex;flex-direction:column;align-items:center;">

  <div class="modeCard">
    🎰 SLOT
    <p>3줄 슬롯 머신</p>
    <button onclick="UI.go('slot')">START</button>
  </div>

  <div class="modeCard">
    🪙 COIN
    <p>50% 확률 게임</p>
    <button onclick="UI.go('coin')">START</button>
  </div>

  <div class="modeCard">
    💰 BET
    <p>배팅 시스템</p>
    <button onclick="UI.go('bet')">START</button>
  </div>

</div>

<!-- ================= SLOT ================= -->

<div id="slot" class="screen">

<div id="slotBox">❓ ❓ ❓</div>

<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= COIN ================= -->

<div id="coin" class="screen">

<div id="coinBox">❓</div>

<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= BET ================= -->

<div id="bet" class="screen">

<input id="betInput" placeholder="BET">

<div class="card" onclick="bet()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= SHOP ================= -->

<div id="shop" class="screen">

<div class="card" onclick="buy('slot')">SLOT BOOST</div>
<div class="card" onclick="buy('coin')">COIN BOOST</div>
<div class="card" onclick="buy('bet')">BET BOOST</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= INVENTORY ================= -->

<div id="inventory" class="screen">

<div id="invBox">EMPTY</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- ================= SOUND ================= -->

<audio id="win" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="lose" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

/* ================= LOAD ================= */

const State = JSON.parse(localStorage.getItem("casino_v3")) || {
money:1000,
best:1000,
inv:{
slot:0,
coin:0,
bet:0
}
};

/* ================= SAVE ================= */

function save(){
localStorage.setItem("casino_v3",JSON.stringify(State));
}

/* ================= UI ================= */

const UI={
go(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}
};

/* ================= RENDER ================= */

function render(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
save();
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best) State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0) State.money=0;
render();
}

/* ================= BOOST ================= */

function boost(type){
return 1 + State.inv[type]*0.1;
}

/* ================= SLOT ================= */

function spin(){

sub(100);

const box=document.getElementById("slotBox");
const icons=["🍒","🍋","💎","7️⃣"];

let i=0;

let t=setInterval(()=>{

box.innerText=
icons[Math.random()*4|0]+" "+
icons[Math.random()*4|0]+" "+
icons[Math.random()*4|0];

i++;

if(i>18){

clearInterval(t);

if(Math.random()<0.3*boost("slot")){
box.innerText="WIN";
add(500);
win.play();
}else{
box.innerText="LOSE";
lose.play();
}

}

},70);

}

/* ================= COIN ================= */

function coin(type){

sub(50);

const box=document.getElementById("coinBox");

let i=0;

let t=setInterval(()=>{

box.innerText=Math.random()<0.5?"HEAD":"TAIL";

i++;

if(i>15){

clearInterval(t);

let r=Math.random()<0.5?"HEAD":"TAIL";

box.innerText=r;

if(r===type && Math.random()<0.5*boost("coin")){
add(100);
win.play();
}else{
lose.play();
}

}

},80);

}

/* ================= BET ================= */

function bet(){

let v=Number(document.getElementById("betInput").value);

if(!v||v>State.money) return;

sub(v);

setTimeout(()=>{

if(Math.random()<0.5*boost("bet")){
add(v*2);
win.play();
}else{
lose.play();
}

},600);

}

/* ================= SHOP ================= */

function buy(type){

const price=300;

if(State.money<price) return;

sub(price);

State.inv[type]++;

render();

}

/* INIT */

render();

</script>

</body>
</html>
