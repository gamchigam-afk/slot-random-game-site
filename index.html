<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X (BETA)</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#0b0700,#000);
color:#ffd700;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* ================= TITLE ================= */

#title{
font-size:60px;
margin-top:60px;
text-shadow:0 0 10px #ffd700,0 0 30px #ffcc00;
}

/* ================= MONEY ================= */

#moneyUI,#bestUI{
position:fixed;
left:50%;
transform:translateX(-50%);
text-shadow:0 0 10px #ffd700;
}

#moneyUI{top:10px;}
#bestUI{top:40px;color:gold;}

/* ================= LAYOUT ================= */

.screen{
display:none;
position:fixed;
inset:0;
flex-direction:column;
align-items:center;
justify-content:center;
}

.active{display:flex;}

/* ================= BUTTON ================= */

.card{
padding:12px;
margin:8px;
border:1px solid #ffd700;
cursor:pointer;
background:rgba(0,0,0,0.5);
box-shadow:0 0 10px #ffcc00;
border-radius:10px;
transition:0.2s;
font-weight:bold;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ffd700,0 0 40px #ffcc00;
}

.card:active{
transform:scale(0.95);
}

/* SLOT */

#slotBox{
font-size:70px;
margin:20px;
}

.small{
font-size:14px;
color:#ffdd88;
}

</style>
</head>

<body>

<div id="moneyUI">💰 50000</div>
<div id="bestUI">🏆 50000</div>

<div id="title">NEON CASINO X (BETA)</div>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="card" onclick="go('choose')">CHOOSE GAME MODE</div>
</div>

<!-- CHOOSE -->
<div id="choose" class="screen">
<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('shop')">SHOP</div>
<div class="card" onclick="go('inv')">INVENTORY</div>
<div class="card" onclick="code()">CODE INPUT</div>
<div class="card" onclick="go('menu')">BACK</div>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="small" id="slotFail"></div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="card" onclick="buy('slot_item')">SLOT ITEM - 30000</div>
<div class="card" onclick="buy('coin_item')">COIN ITEM - 30000</div>
<div class="card" onclick="buy('bet_item')">BET ITEM - 30000</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- INVENTORY -->
<div id="inv" class="screen">
<div id="invBox">EMPTY</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- CODE -->
<div id="code" class="screen">
<div id="codeBox" class="card">준비중입니다</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000,
inv:[]
};

/* ================= SAVE SYSTEM ================= */

function save(){
localStorage.setItem("NEON_CASINO",JSON.stringify(State));
}

function load(){
const d=localStorage.getItem("NEON_CASINO");
if(!d) return;

const s=JSON.parse(d);

State.money=s.money??50000;
State.best=s.best??50000;
State.inv=s.inv??[];
}

/* ================= UI ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
}

function render(){
moneyUI.innerText="💰 "+State.money;
bestUI.innerText="🏆 "+State.best;
invBox.innerHTML=State.inv.length?State.inv.join("<br>"):"EMPTY";
save();
}

/* ================= SLOT (450:1) ================= */

function spin(){
sub(100);

let box=slotBox;
let i=0;

let inter=setInterval(()=>{

box.innerText=["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]
+" "+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]
+" "+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)];

i++;

if(i>15){
clearInterval(inter);

let win=Math.random()<1/450;

if(win){
add(1000);
slotFail.innerText="";
}else{
slotFail.innerText="FAIL";
sub(200);
}

}

},70);
}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
coinBox.innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;

sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= CODE ================= */

function code(){
go('code');
}

/* ================= SHOP ================= */

function buy(item){
if(State.money<30000)return;

sub(30000);
State.inv.push(item);
}

/* ================= INIT ================= */

load();
render();

</script>

</body>
</html>
