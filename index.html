<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
height:100vh;
overflow:hidden;
text-shadow:0 0 10px #00ffff;
}

/* ================= TITLE ================= */

.title{
font-size:60px;
text-align:center;
margin-top:60px;
animation:blink 1.5s infinite;
}

.beta{
font-size:14px;
margin-left:10px;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* ================= UI ================= */

.screen{display:none;}
.card{
padding:10px 15px;
margin:5px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
}
.card:hover{transform:scale(1.05);}

/* ================= SIDE ================= */

.side{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
}

/* ================= MODE ================= */

.modeCard{
width:250px;
padding:15px;
border:2px solid #00ffff;
margin:10px;
text-align:center;
box-shadow:0 0 20px #00ffff;
}

/* ================= MINI GAME ================= */

#miniText{
font-size:30px;
margin:20px;
}

</style>
</head>

<body>

<div class="title">
NEON CASINO X <span class="beta">BETA</span>
</div>

<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 1000</div>

<!-- SIDE -->
<div class="side">
<div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
<div class="card" onclick="UI.go('inventory')">🎒 INVENTORY</div>
<div class="card" onclick="UI.go('mini')">🎮 MINI GAME</div>
</div>

<!-- WELCOME -->
<div id="welcome" class="screen" style="display:flex;flex-direction:column;align-items:center;">
  <div class="card" onclick="UI.go('mode')">
    🎮 추스 게임 모드
  </div>
</div>

<!-- MODE -->
<div id="mode" class="screen">

<div class="modeCard">
🎰 SLOT
<button onclick="UI.go('slot')">START</button>
</div>

<div class="modeCard">
🪙 COIN
<button onclick="UI.go('coin')">START</button>
</div>

<div class="modeCard">
💰 BET
<button onclick="UI.go('bet')">START</button>
</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- SLOT -->
<div id="slot" class="screen">

<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- COIN -->
<div id="coin" class="screen">

<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- BET -->
<div id="bet" class="screen">

<input id="betInput" placeholder="BET">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- SHOP -->
<div id="shop" class="screen">

<div class="card">SLOT BOOST</div>
<div class="card">COIN BOOST</div>
<div class="card">BET BOOST</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- INVENTORY -->
<div id="inventory" class="screen">

<div>EMPTY</div>
<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- MINI GAME -->
<div id="mini" class="screen">

<div id="miniText">WAIT...</div>

<div class="card" onclick="miniClick()">CLICK</div>
<div class="card" onclick="miniReset()">RESET</div>
<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<script>

/* ================= STATE ================= */

const State = JSON.parse(localStorage.getItem("casino_v4")) || {
money:1000,
best:1000
};

function save(){
localStorage.setItem("casino_v4",JSON.stringify(State));
}

/* ================= UI ================= */

const UI={
go(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}
};

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best) State.best=State.money;
update();
}

function sub(v){
State.money-=v;
if(State.money<0) State.money=0;
update();
}

function update(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
save();
}

update();

/* ================= SLOT ================= */

function spin(){
sub(100);
document.getElementById("slotBox").innerText="SPIN...";
setTimeout(()=>{
if(Math.random()<0.3){
add(500);
document.getElementById("slotBox").innerText="WIN";
}else{
document.getElementById("slotBox").innerText="LOSE";
}
},1000);
}

/* ================= COIN ================= */

function coin(type){
sub(50);
let r=Math.random()<0.5?"HEAD":"TAIL";
if(r===type){
add(100);
}else{
sub(0);
}
document.getElementById("coinBox").innerText=r;
}

/* ================= BET ================= */

function bet(){
let v=Number(document.getElementById("betInput").value);
if(!v||v>State.money) return;
sub(v);
setTimeout(()=>{
if(Math.random()<0.5){
add(v*2);
}else{
sub(0);
}
},600);
}

/* ================= MINI GAME ================= */

let miniState=0;
let canClick=false;

function miniStart(){
miniState=1;
canClick=true;
document.getElementById("miniText").innerText="지금!";
setTimeout(()=>{
if(miniState===1){
miniState=2;
canClick=false;
document.getElementById("miniText").innerText="실패";
}
},3000);
}

function miniClick(){

if(miniState===0){
document.getElementById("miniText").innerText="실격!";
return;
}

let t=Date.now()%1000;

if(t<300){
add(50);
document.getElementById("miniText").innerText="50원!";
}
else if(t<500){
add(25);
document.getElementById("miniText").innerText="25원!";
}
else{
document.getElementById("miniText").innerText="실패";
}

miniState=0;
}

function miniReset(){
miniState=0;
document.getElementById("miniText").innerText="WAIT...";
setTimeout(miniStart,1000);
}

setTimeout(miniStart,1000);

</script>

</body>
</html>
