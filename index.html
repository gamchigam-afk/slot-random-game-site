<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X (BETA)</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#0b0700,#000);
color:#ffd700;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* ================= TITLE ================= */

#title{
font-size:60px;
margin-top:60px;
text-shadow:0 0 10px #ffd700,0 0 30px #ffcc00;
}

/* ================= MONEY ================= */

#moneyUI,#bestUI{
position:fixed;
left:50%;
transform:translateX(-50%);
text-shadow:0 0 10px #ffd700;
}

#moneyUI{top:10px;}
#bestUI{top:40px;color:gold;}

/* ================= LAYOUT ================= */

#layout{
display:flex;
height:100vh;
}

/* LEFT PANEL */

#left{
width:200px;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
}

/* SCREEN SYSTEM (FULL PAGE) */

.screen{
display:none;
position:fixed;
inset:0;
flex-direction:column;
align-items:center;
justify-content:center;
}

.active{display:flex;}

/* CARD */

.card{
padding:10px;
margin:6px;
border:1px solid #ffd700;
cursor:pointer;
box-shadow:0 0 10px #ffcc00;
background:rgba(0,0,0,0.4);
}

/* GOLD */

#gold{
font-size:100px;
cursor:pointer;
user-select:none;
transition:0.1s;
}

.shrink{transform:scale(0.7);}

/* SLOT */

#slotBox{
font-size:70px;
margin:20px;
}

/* SMALL TEXT */

.small{
font-size:14px;
color:#ffdd88;
}

</style>
</head>

<body>

<div id="moneyUI">💰 50000</div>
<div id="bestUI">🏆 50000</div>

<div id="title">NEON CASINO X (BETA)</div>

<div id="layout">

<!-- LEFT MENU -->
<div id="left">

<div class="card" onclick="go('inv')">INVENTORY</div>
<div class="card" onclick="go('shop')">SHOP</div>
<div class="card" onclick="code()">CODE INPUT</div>

</div>

</div>

<!-- ================= MAIN MENU ================= -->
<div id="menu" class="screen active">

<div class="card" onclick="go('choose')">CHOOSE GAME MODE</div>

</div>

<!-- ================= CHOOSE GAME MODE ================= -->
<div id="choose" class="screen">

<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('mine')">GOLD MINE</div>

<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= SLOT ================= -->
<div id="slot" class="screen">

<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="small" id="slotFail"></div>
<div class="card" onclick="go('choose')">BACK</div>

</div>

<!-- ================= COIN ================= -->
<div id="coin" class="screen">

<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('choose')">BACK</div>

</div>

<!-- ================= BET ================= -->
<div id="bet" class="screen">

<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('choose')">BACK</div>

</div>

<!-- ================= SHOP ================= -->
<div id="shop" class="screen">

<div class="card">SHOP READY</div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= INVENTORY ================= -->
<div id="inv" class="screen">

<div class="card">INVENTORY READY</div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= CODE INPUT ================= -->
<div id="code" class="screen">

<div class="card">준비중..</div>
<div class="card" onclick="go('menu')">BACK</div>

</div>

<!-- ================= GOLD MINE ================= -->
<div id="mine" class="screen">

<h2>⛏️ GOLD MINE</h2>

<div id="gold">🪙</div>

<div id="mineText">10 SECONDS HOLD</div>

<div class="card" onclick="go('choose')">EXIT</div>

</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000
};

/* ================= UI ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
}

function render(){
moneyUI.innerText="💰 "+State.money;
bestUI.innerText="🏆 "+State.best;
}

/* ================= SLOT ================= */

function spin(){
sub(100);
let box=slotBox;
let i=0;

let inter=setInterval(()=>{

box.innerText=["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]
+" "+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]
+" "+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)];

i++;

if(i>15){
clearInterval(inter);
let a=Math.random(),b=Math.random(),c=Math.random();

if(a===b&&b===c){
add(1000);
slotFail.innerText="";
}else{
slotFail.innerText="FAIL";
sub(200);
}

}

},70);
}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
coinBox.innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;
sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= CODE ================= */

function code(){
go('code');
}

/* ================= GOLD MINE ================= */

const gold=document.getElementById("gold");

let holding=false;
let timer=null;
let time=0;

gold.onmousedown=()=>{

holding=true;
time=0;
mineText.innerText="MINING... HOLD 10s";

timer=setInterval(()=>{

if(!holding){
clearInterval(timer);
mineText.innerText="FAILED";
return;
}

time++;

if(time>=1000){
clearInterval(timer);
add(10);
mineText.innerText="SUCCESS +10";
holding=false;
}

},10);

};

gold.onmouseup=stopMine;
gold.onmouseleave=stopMine;

function stopMine(){

if(!holding) return;

holding=false;
clearInterval(timer);
mineText.innerText="FAILED";

}

</script>

</body>
</html>
