<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 CASINO APP</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:gold;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:100%;
    max-width:600px;
    padding:20px;
    position:relative;
    text-align:center;
}

/* 💰 돈 */
#money{
    color:white;
    font-size:20px;
}

/* 🏆 최고점수 */
#bestScore{
    position:absolute;
    top:10px;
    left:10px;
    font-size:14px;
    color:gold;
}

/* 🏪 상점 */
#shopBtn{
    position:absolute;
    top:10px;
    right:10px;
}

/* 📋 좌측 메뉴 */
#sideMenu{
    position:absolute;
    left:10px;
    top:120px;
    display:flex;
    flex-direction:column;
}

/* 버튼 */
button{
    margin:5px;
    padding:10px 12px;
    border:none;
    border-radius:8px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
}

.screen{display:none;}
.active{display:block;}

/* 슬롯 */
.slot-box{
    font-size:60px;
    padding:20px;
    border:4px solid gold;
    background:#111;
    border-radius:15px;
    margin:20px 0;
}

/* 코인 */
.coin{
    font-size:80px;
}
</style>
</head>

<body>

<div id="app">

<div id="money">💰 1000원</div>
<div id="bestScore">🏆 BEST: 0</div>

<button id="shopBtn">🏪 SHOP</button>

<!-- 🏠 WELCOME -->
<div id="welcome" class="screen active">

    <h1>🎉 CASINO APP</h1>

    <button onclick="goMode()">🎮 GAME MODE</button>

    <!-- 📋 좌측 메뉴 -->
    <div id="sideMenu">
        <button onclick="openMini()">🎮 MINI</button>
        <button onclick="showOdds()">📊 확률</button>
        <button onclick="openInventory()">🎒 인벤토리</button>
    </div>

</div>

<!-- 🎮 MODE -->
<div id="mode" class="screen">
    <h2>🎮 GAME MODE</h2>

    <button onclick="openSlot()">🎰 SLOT</button>
    <button onclick="openCoin()">🪙 COIN</button>
    <button onclick="openBet()">💰 BET</button>

    <br>
    <button onclick="goWelcome()">🚪 나가기</button>
</div>

<!-- 🎰 SLOT -->
<div id="slot" class="screen">
    <h2>🎰 SLOT</h2>

    <div class="slot-box" id="slotBox">❓ ❓ ❓</div>

    <button onclick="spin()">SPIN (100)</button>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="result"></p>
</div>

<!-- 🪙 COIN -->
<div id="coin" class="screen">
    <h2>🪙 COIN</h2>

    <div class="coin" id="coinFace">❓</div>

    <button onclick="flip('HEAD')">HEAD</button>
    <button onclick="flip('TAIL')">TAIL</button>

    <br>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="coinResult"></p>
</div>

<!-- 💰 BET -->
<div id="bet" class="screen">
    <h2>💰 BET MODE</h2>

    <input type="number" id="betAmount" placeholder="베팅 금액">

    <button onclick="playBet()">START</button>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="betResult"></p>
</div>

<!-- 🎮 MINI -->
<div id="mini" class="screen">
    <h2>🎮 MINI GAME</h2>

    <h1 id="miniText">READY...</h1>

    <button onclick="pressMini()" id="miniBtn" disabled>CLICK</button>

    <br>
    <button onclick="goWelcome()">🚪 나가기</button>

    <p id="miniResult"></p>
</div>

</div>

<script>

let money = Number(localStorage.getItem("money"));
if(isNaN(money)) money = 1000;

let best = Number(localStorage.getItem("best"));
if(isNaN(best)) best = 0;

const items=["🍒","🍋","🍇","🔔","⭐","7️⃣"];

function updateMoney(){
    document.getElementById("money").innerText="💰 "+money;
    localStorage.setItem("money",money);

    if(money > best){
        best = money;
        localStorage.setItem("best",best);
        document.getElementById("bestScore").innerText="🏆 BEST: "+best;
    }
}
updateMoney();
document.getElementById("bestScore").innerText="🏆 BEST: "+best;

/* 화면 */
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goWelcome(){ show("welcome"); }
function goMode(){ show("mode"); }

function openSlot(){ show("slot"); }
function openCoin(){ show("coin"); }
function openBet(){ show("bet"); }
function openMini(){ show("mini"); startMini(); }

/* 🎰 SLOT */
function spin(){
    if(money<100) return;

    money-=100;
    updateMoney();

    let box=document.getElementById("slotBox");

    let anim=setInterval(()=>{
        box.innerText=items[Math.floor(Math.random()*items.length)]+" "+items[Math.floor(Math.random()*items.length)]+" "+items[Math.floor(Math.random()*items.length)];
    },80);

    setTimeout(()=>{
        clearInterval(anim);

        let a=items[Math.floor(Math.random()*items.length)];
        let b=items[Math.floor(Math.random()*items.length)];
        let c=items[Math.floor(Math.random()*items.length)];

        box.innerText=`${a} ${b} ${c}`;

        if(a===b && b===c){
            money+=1000;
        }

        updateMoney();
    },2000);
}

/* 🪙 COIN */
function flip(choice){
    if(money<50) return;

    money-=50;
    updateMoney();

    let face=document.getElementById("coinFace");

    let anim=setInterval(()=>{
        face.innerText=Math.random()<0.5?"HEAD":"TAIL";
    },100);

    setTimeout(()=>{
        clearInterval(anim);

        let res=Math.random()<0.5?"HEAD":"TAIL";
        face.innerText=res;

        if(choice===res){
            money+=100;
        }

        updateMoney();
    },1200);
}

/* 💰 BET */
function playBet(){
    let bet=Number(document.getElementById("betAmount").value);

    if(bet>money || bet<=0) return;

    money-=bet;

    if(Math.random()<0.5){
        money+=bet*2;
    }

    updateMoney();
}

/* 🎮 MINI */
let canPress=false;
let startTime=0;

function startMini(){
    canPress=false;
    document.getElementById("miniBtn").disabled=true;

    setTimeout(()=>{
        canPress=true;
        startTime=Date.now();
        document.getElementById("miniBtn").disabled=false;
        document.getElementById("miniText").innerText="🔥 GO!";
    },1500);
}

function pressMini(){
    if(!canPress) return;

    let t=Date.now()-startTime;

    canPress=false;
    document.getElementById("miniBtn").disabled=true;

    if(t<300) money+=100;
    else if(t<600) money+=50;

    updateMoney();
    setTimeout(startMini,1500);
}

/* 확률 */
function showOdds(){
    alert("🎰 슬롯 / 🪙 코인 / 💰 베팅 / 🎮 미니게임");
}

/* 인벤토리 */
function openInventory(){
    alert("🎒 인벤토리 준비중");
}

</script>

</body>
</html>
