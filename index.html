<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 CASINO APP</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:gold;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:100%;
    max-width:600px;
    padding:20px;
    position:relative;
    text-align:center;
}

/* 💰 UI */
#money{
    color:white;
    font-size:20px;
}

#bestScore{
    position:absolute;
    top:10px;
    left:10px;
    font-size:14px;
    color:gold;
}

/* 🎴 카드 UI */
.card{
    background:#111;
    border:2px solid gold;
    border-radius:12px;
    padding:14px;
    margin:10px;
    cursor:pointer;
    transition:0.2s;
    color:gold;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 10px gold;
}

#sideMenu{
    position:absolute;
    left:10px;
    top:120px;
    display:flex;
    flex-direction:column;
}

.screen{display:none;}
.active{display:block;}

.slot-box{
    font-size:60px;
    padding:20px;
    border:3px solid gold;
    background:#111;
    border-radius:15px;
}

.coin{font-size:80px;}

input{
    padding:10px;
    border-radius:8px;
    border:none;
    text-align:center;
    margin:5px;
}
</style>
</head>

<body>

<div id="app">

<div id="money">💰 1000원</div>
<div id="bestScore">🏆 BEST: 0</div>

<!-- 🔊 SOUND -->
<audio id="clickSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9a3d5c.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9a3d5c.mp3"></audio>
<audio id="loseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9a3d5c.mp3"></audio>
<audio id="spinSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9a3d5c.mp3"></audio>

<!-- 🏠 WELCOME -->
<div id="welcome" class="screen active">

    <h1>🎉 CASINO APP</h1>

    <div class="card" onclick="goMode()">🎮 GAME MODE</div>

    <div id="sideMenu">
        <div class="card" onclick="openMini()">🎮 MINI</div>
        <div class="card" onclick="showOdds()">📊 ODDS</div>
        <div class="card" onclick="openInventory()">🎒 INVENTORY</div>
    </div>

</div>

<!-- 🎮 MODE -->
<div id="mode" class="screen">
    <h2>🎮 GAME MODE</h2>

    <div class="card" onclick="openSlot()">🎰 SLOT</div>
    <div class="card" onclick="openCoin()">🪙 COIN</div>
    <div class="card" onclick="openBet()">💰 BET</div>

    <div class="card" onclick="goWelcome()">🚪 BACK</div>
</div>

<!-- 🎰 SLOT -->
<div id="slot" class="screen">
    <h2>🎰 SLOT</h2>

    <div class="slot-box" id="slotBox">❓ ❓ ❓</div>

    <div class="card" onclick="spin()">SPIN (100)</div>
    <div class="card" onclick="goMode()">BACK</div>

    <p id="result"></p>
</div>

<!-- 🪙 COIN -->
<div id="coin" class="screen">
    <h2>🪙 COIN</h2>

    <div class="coin" id="coinFace">❓</div>

    <div class="card" onclick="flip('HEAD')">HEAD</div>
    <div class="card" onclick="flip('TAIL')">TAIL</div>

    <div class="card" onclick="goMode()">BACK</div>

    <p id="coinResult"></p>
</div>

<!-- 💰 BET -->
<div id="bet" class="screen">
    <h2>💰 BET MODE</h2>

    <input type="number" id="betAmount" placeholder="BET AMOUNT">

    <div class="card" onclick="playBet()">START</div>
    <div class="card" onclick="goMode()">BACK</div>

    <p id="betResult"></p>
</div>

<!-- 🎮 MINI -->
<div id="mini" class="screen">
    <h2>🎮 MINI GAME</h2>

    <h1 id="miniText">READY...</h1>

    <div class="card" onclick="pressMini()" id="miniBtn">CLICK</div>

    <div class="card" onclick="goWelcome()">BACK</div>

    <p id="miniResult"></p>
</div>

</div>

<script>

let money = Number(localStorage.getItem("money"));
if(isNaN(money)) money = 1000;

let best = Number(localStorage.getItem("best"));
if(isNaN(best)) best = 0;

function play(id){
    let a=document.getElementById(id);
    a.currentTime=0;
    a.play();
}

function updateMoney(){
    document.getElementById("money").innerText="💰 "+money;
    localStorage.setItem("money",money);

    if(money>best){
        best=money;
        localStorage.setItem("best",best);
    }

    document.getElementById("bestScore").innerText="🏆 BEST: "+best;
}
updateMoney();

/* 화면 */
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goWelcome(){ show("welcome"); }
function goMode(){ show("mode"); }

function openSlot(){ show("slot"); }
function openCoin(){ show("coin"); }
function openBet(){ show("bet"); }
function openMini(){ show("mini"); startMini(); }

/* 🎰 SLOT */
const items=["🍒","🍋","🍇","🔔","⭐","7️⃣"];

function spin(){
    if(money<100) return;

    play("spinSound");

    money-=100;

    let box=document.getElementById("slotBox");

    let anim=setInterval(()=>{
        box.innerText=items[Math.floor(Math.random()*6)]+" "+items[Math.floor(Math.random()*6)]+" "+items[Math.floor(Math.random()*6)];
    },80);

    setTimeout(()=>{
        clearInterval(anim);

        let a=items[Math.floor(Math.random()*6)];
        let b=items[Math.floor(Math.random()*6)];
        let c=items[Math.floor(Math.random()*6)];

        box.innerText=`${a} ${b} ${c}`;

        if(a===b && b===c){
            money+=1000;
            play("winSound");
        }else{
            play("loseSound");
        }

        updateMoney();
    },1500);
}

/* 🪙 COIN */
function flip(choice){
    if(money<50) return;

    play("clickSound");

    money-=50;

    let face=document.getElementById("coinFace");

    let anim=setInterval(()=>{
        face.innerText=Math.random()<0.5?"HEAD":"TAIL";
    },100);

    setTimeout(()=>{
        clearInterval(anim);

        let res=Math.random()<0.5?"HEAD":"TAIL";
        face.innerText=res;

        if(choice===res){
            money+=100;
            play("winSound");
        }else{
            play("loseSound");
        }

        updateMoney();
    },1200);
}

/* 💰 BET */
function playBet(){
    play("clickSound");

    let bet=Number(document.getElementById("betAmount").value);

    if(bet>money || bet<=0) return;

    money-=bet;

    if(Math.random()<0.5){
        money+=bet*2;
        play("winSound");
    }else{
        play("loseSound");
    }

    updateMoney();
}

/* 🎮 MINI */
let canPress=false;
let startTime=0;

function startMini(){
    canPress=false;

    document.getElementById("miniText").innerText="READY...";

    setTimeout(()=>{
        canPress=true;
        startTime=Date.now();
        document.getElementById("miniText").innerText="🔥 GO!";
    },1200);
}

function pressMini(){
    if(!canPress) return;

    let t=Date.now()-startTime;
    canPress=false;

    if(t<300){
        money+=100;
        play("winSound");
    }else{
        play("loseSound");
    }

    updateMoney();
    setTimeout(startMini,1500);
}

/* ETC */
function showOdds(){
    alert("🎰 SLOT / 🪙 COIN / 💰 BET / 🎮 MINI");
}

function openInventory(){
    alert("🎒 INVENTORY READY SOON");
}

</script>

</body>
</html>
