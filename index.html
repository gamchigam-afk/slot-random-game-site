<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎰 CASINO GAME</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:gold;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

#app{
    width:100%;
    max-width:500px;
    padding:20px;
}

button{
    margin:6px;
    padding:10px 14px;
    border:none;
    border-radius:8px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
}

.screen{ display:none; }
.active{ display:block; }

#money{
    color:white;
    font-size:22px;
    margin-bottom:10px;
}

/* 슬롯 */
.slot-box{
    font-size:60px;
    padding:20px;
    border:4px solid gold;
    background:#111;
    border-radius:15px;
    margin:20px 0;
}

/* 🪙 코인 애니메이션 */
.coin {
    font-size: 80px;
    display: inline-block;
    transition: transform 0.3s;
}

.flip {
    animation: flipAnim 0.3s infinite;
}

@keyframes flipAnim {
    0%   { transform: rotateY(0deg); }
    50%  { transform: rotateY(180deg); }
    100% { transform: rotateY(360deg); }
}

/* 팝업 */
#popup{
    display:none;
    position:fixed;
    top:30%;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    border:3px solid gold;
    padding:20px;
}
</style>
</head>

<body>

<div id="app">

<div id="money">💰 1000원</div>

<!-- 🎉 WELCOME -->
<div id="welcome" class="screen active">
    <h1>🎉 CASINO</h1>

    <button onclick="goMode()">🎮 GAME MODE</button>

    <div>
        <button onclick="openPopup()">⚙️ 설정</button>
        <button onclick="openMini()">🎮 미니게임</button>
        <button onclick="showOdds()">📊 확률</button>
    </div>
</div>

<!-- 🎮 MODE -->
<div id="mode" class="screen">
    <h2>🎮 GAME MODE</h2>

    <button onclick="openSlot()">🎰 SLOT</button>
    <button onclick="openCoin()">🪙 COIN FLIP</button>
    <br>
    <button onclick="goWelcome()">🚪 나가기</button>
</div>

<!-- 🎰 SLOT -->
<div id="slot" class="screen">
    <h2>🎰 SLOT</h2>

    <div class="slot-box" id="slotBox">❓ ❓ ❓</div>

    <button onclick="spin()">SPIN (100원)</button>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="result"></p>
</div>

<!-- 🪙 COIN -->
<div id="coin" class="screen">
    <h2>🪙 COIN FLIP</h2>

    <div class="coin" id="coinFace">❓</div>

    <br>

    <button onclick="flip('HEAD')">HEAD</button>
    <button onclick="flip('TAIL')">TAIL</button>
    <br>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="coinResult"></p>
</div>

<!-- 🎮 MINI GAME -->
<div id="mini" class="screen">
    <h2>🎮 REACTION GAME</h2>

    <h1 id="miniText">READY...</h1>

    <button onclick="pressMini()" id="miniBtn" disabled>CLICK!</button>
    <br>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="miniResult"></p>
</div>

</div>

<!-- 팝업 -->
<div id="popup">
    <h3>⏳ 준비중</h3>
    <button onclick="closePopup()">나가기</button>
</div>

<script>

let money = Number(localStorage.getItem("money"));
if(isNaN(money)) money = 1000;

const items=["🍒","🍋","🍇","🔔","⭐","7️⃣"];

function updateMoney(){
    document.getElementById("money").innerText="💰 "+money+"원";
    localStorage.setItem("money",money);
}
updateMoney();

/* 화면 */
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goWelcome(){ show("welcome"); }
function goMode(){ show("mode"); }
function openSlot(){ show("slot"); }
function openCoin(){ show("coin"); }
function openMini(){ show("mini"); startMini(); }

/* 🎰 SLOT */
function spin(){
    if(money<100){
        document.getElementById("result").innerText="돈 부족";
        return;
    }

    money-=100;
    updateMoney();

    let box=document.getElementById("slotBox");
    document.getElementById("result").innerText="돌리는 중...";

    let anim=setInterval(()=>{
        let a=items[Math.floor(Math.random()*items.length)];
        let b=items[Math.floor(Math.random()*items.length)];
        let c=items[Math.floor(Math.random()*items.length)];
        box.innerText=`${a} ${b} ${c}`;
    },80);

    setTimeout(()=>{
        clearInterval(anim);

        let a=items[Math.floor(Math.random()*items.length)];
        let b=items[Math.floor(Math.random()*items.length)];
        let c=items[Math.floor(Math.random()*items.length)];

        box.innerText=`${a} ${b} ${c}`;

        if(a===b && b===c){
            money+=1000;
            document.getElementById("result").innerText="🎉 JACKPOT";
        }else{
            document.getElementById("result").innerText="😢 LOSE";
        }

        updateMoney();
    },2000);
}

/* 🪙 COIN (애니메이션 추가) */
function flip(choice){
    if(money<50){
        document.getElementById("coinResult").innerText="돈 부족";
        return;
    }

    money-=50;
    updateMoney();

    let face=document.getElementById("coinFace");
    let resultText=document.getElementById("coinResult");

    resultText.innerText="🪙 던지는 중...";

    // 🔥 회전 모션 시작
    face.classList.add("flip");

    let anim=setInterval(()=>{
        face.innerText=Math.random()<0.5?"HEAD":"TAIL";
    },100);

    setTimeout(()=>{
        clearInterval(anim);
        face.classList.remove("flip");

        let result=Math.random()<0.5?"HEAD":"TAIL";
        face.innerText=result;

        if(choice===result){
            money+=100;
            resultText.innerText="🎉 WIN +100";
        }else{
            resultText.innerText="😢 LOSE";
        }

        updateMoney();
    },1500);
}

/* 🎮 MINI GAME (보상 최대 100) */
let canPress=false;
let startTime=0;

function startMini(){
    canPress=false;
    document.getElementById("miniText").innerText="READY...";
    document.getElementById("miniBtn").disabled=true;
    document.getElementById("miniResult").innerText="";

    let delay=Math.random()*2500+1000;

    setTimeout(()=>{
        document.getElementById("miniText").innerText="🔥 GO!";
        document.getElementById("miniBtn").disabled=false;
        canPress=true;
        startTime=Date.now();
    },delay);
}

function pressMini(){
    if(!canPress){
        document.getElementById("miniResult").innerText="❌ 너무 빨랐음";
        return;
    }

    let t=Date.now()-startTime;
    canPress=false;
    document.getElementById("miniBtn").disabled=true;

    if(t<300){
        money+=100;   // 🔥 최대 100으로 제한
        document.getElementById("miniResult").innerText="🏆 PERFECT +100";
    }else if(t<600){
        money+=50;
        document.getElementById("miniResult").innerText="🎉 GOOD +50";
    }else{
        document.getElementById("miniResult").innerText="😢 SLOW";
    }

    updateMoney();
    setTimeout(startMini,1500);
}

/* 팝업 */
function openPopup(){
    document.getElementById("popup").style.display="block";
}
function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* 확률 */
function showOdds(){
    document.getElementById("popup").style.display="block";
    document.getElementById("popup").innerHTML=`
        <h3>📊 확률</h3>
        <p>🎰 슬롯: 약 0.46%</p>
        <p>🪙 코인: 50%</p>
        <p>🎮 미니게임: 실력 (최대 100)</p>
        <button onclick="closePopup()">나가기</button>
    `;
}

</script>

</body>
</html>
