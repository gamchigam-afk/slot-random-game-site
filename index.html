<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Slot Menu</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #ffd700;
    font-family: Arial;
    text-align: center;
}

/* 헤더 */
h1 {
    margin-top: 20px;
    text-shadow: 0 0 10px gold;
}

/* 돈 */
#money {
    font-size: 24px;
    color: white;
}

/* 슬롯 */
.slot-container {
    margin: 20px auto;
    width: 320px;
    padding: 20px;
    border: 6px solid gold;
    border-radius: 15px;
    background: #111;
    box-shadow: 0 0 20px gold;
}

.slot {
    font-size: 60px;
    letter-spacing: 10px;
}

/* 버튼 */
button {
    margin: 8px;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: gold;
    font-weight: bold;
}

/* 메뉴 */
#menu {
    display: none;
    margin-top: 20px;
    padding: 20px;
    background: #111;
    border-top: 3px solid gold;
}

.menu-box {
    border: 2px solid gold;
    padding: 15px;
    margin: 10px auto;
    width: 250px;
}
</style>
</head>

<body>

<h1>🎰 CASINO SLOT</h1>

<div id="money">💰 1000원</div>

<button onclick="toggleMenu()">📋 MENU</button>

<!-- 슬롯 -->
<div class="slot-container">
    <div class="slot" id="slot">❓ ❓ ❓</div>
</div>

<button onclick="spin()" id="spinBtn">🎲 SPIN</button>

<div id="result"></div>

<!-- MENU -->
<div id="menu">
    <h2>📋 MENU</h2>

    <div class="menu-box">
        <button onclick="resetMoney()">💰 돈 초기화</button>
    </div>

    <div class="menu-box">
        <button onclick="showOdds()">📊 확률 보기</button>
    </div>

    <div class="menu-box">
        <button onclick="toggleMenu()">🎰 게임으로 돌아가기</button>
    </div>

    <p id="menuInfo"></p>
</div>

<script>
const SAVE_KEY = "casino_money";

let money = Number(localStorage.getItem(SAVE_KEY));
if (isNaN(money)) money = 1000;

const items = ["🍒", "🍋", "🍇", "🔔", "⭐", "7️⃣"];
let spinning = false;

function updateUI() {
    document.getElementById("money").innerText = "💰 " + money + "원";
    localStorage.setItem(SAVE_KEY, money);
}
updateUI();

/* 슬롯 */
function spin() {
    if (spinning) return;
    if (money < 100) {
        document.getElementById("result").innerText = "돈 부족 💸";
        return;
    }

    spinning = true;
    money -= 100;
    updateUI();

    let slot = document.getElementById("slot");
    let btn = document.getElementById("spinBtn");

    btn.disabled = true;
    document.getElementById("result").innerText = "🎰 SPINNING...";

    let interval = setInterval(() => {
        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];
        slot.innerText = `${a} ${b} ${c}`;
    }, 80);

    setTimeout(() => {
        clearInterval(interval);

        let a = items[Math.floor(Math.random() * items.length)];
        let b = items[Math.floor(Math.random() * items.length)];
        let c = items[Math.floor(Math.random() * items.length)];

        slot.innerText = `${a} ${b} ${c}`;

        if (a === b && b === c) {
            money += 1000;
            document.getElementById("result").innerText = "🎉 JACKPOT!";
        } else {
            document.getElementById("result").innerText = "😢 LOSE";
        }

        updateUI();
        btn.disabled = false;
        spinning = false;

    }, 2000);
}

/* 메뉴 토글 */
function toggleMenu() {
    let menu = document.getElementById("menu");
    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

/* 돈 초기화 */
function resetMoney() {
    money = 1000;
    updateUI();
    document.getElementById("menuInfo").innerText = "돈 초기화 완료 💰";
}

/* 확률 표시 */
function showOdds() {
    document.getElementById("menuInfo").innerText =
        "🎰 잭팟 확률: 약 0.46% (1/216)";
}
</script>

</body>
</html>
