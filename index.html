<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#120c00,#000);
color:#ffd700;
font-family:Arial;
overflow:hidden;
}

/* ================= HUD ================= */

#hud{
position:fixed;
top:10px;
right:10px;
text-align:right;
z-index:1000;
}

#money,#best{
font-weight:bold;
text-shadow:0 0 10px #ffd700;
}

#log{
font-size:12px;
color:#ffdd88;
margin-top:5px;
height:30px;
}

/* ================= LEFT MENU ================= */

#left{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:1000;
}

.btn{
padding:10px;
border:1px solid #ffd700;
background:rgba(0,0,0,0.4);
cursor:pointer;
box-shadow:0 0 10px #ffcc00;
transition:0.2s;
}
.btn:hover{transform:scale(1.05);}

/* ================= SCREENS ================= */

.screen{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.active{display:flex;}

/* ================= TITLE ================= */

#title{
font-size:60px;
text-shadow:0 0 20px #ffd700;
}

.card{
padding:12px;
margin:8px;
border:1px solid #ffd700;
background:rgba(0,0,0,0.5);
cursor:pointer;
}

/* ================= GOLD ================= */

#gold{
font-size:100px;
cursor:pointer;
user-select:none;
}

/* ================= SLOT ================= */

#slotBox{
font-size:60px;
}

</style>
</head>

<body>

<!-- HUD -->
<div id="hud">
<div id="money">💰 50000</div>
<div id="best">🏆 50000</div>
<div id="log"></div>
</div>

<!-- LEFT -->
<div id="left">
<div class="btn" onclick="go('mine')">⛏ GOLD</div>
<div class="btn" onclick="go('inv')">🎒 INV</div>
<div class="btn" onclick="go('shop')">🛒 SHOP</div>
</div>

<!-- MENU -->
<div id="menu" class="screen active">
<div id="title">NEON CASINO X</div>
<div class="card" onclick="go('choose')">START</div>
</div>

<!-- CHOOSE -->
<div id="choose" class="screen">
<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('mine')">GOLD MINE</div>
<div class="card" onclick="go('menu')">BACK</div>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div id="slotBox">SPIN</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div id="coinBox">🪙</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betInput" placeholder="NUMBER ONLY">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- GOLD MINE -->
<div id="mine" class="screen">
<div id="gold">🪙</div>
<div id="mineText">HOLD 10s</div>
<div class="card" onclick="go('choose')">EXIT</div>
</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000
};

/* ================= SAVE ================= */

function save(){
localStorage.setItem("NEON",JSON.stringify(State));
}

function load(){
const d=localStorage.getItem("NEON");
if(d)Object.assign(State,JSON.parse(d));
}

/* ================= LOG ================= */

function log(t){
document.getElementById("log").innerText=t;
setTimeout(()=>document.getElementById("log").innerText="",1200);
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
log("+"+v);
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
log("-"+v);
}

/* ================= RENDER ================= */

function render(){
money.innerText="💰 "+State.money;
best.innerText="🏆 "+State.best;
save();
}

/* ================= SCREEN ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= SLOT (1/450) ================= */

function spin(){
sub(100);

let i=0;

let inter=setInterval(()=>{

slotBox.innerText=
["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]+" "
+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]+" "
+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)];

i++;

if(i>15){
clearInterval(inter);

let win=Math.random()<1/450;

if(win) add(1000);
else sub(200);
}

},70);
}

/* ================= COIN (100 cost / 200 win) ================= */

function coin(t){

if(State.money<100) return;
sub(100);

let box=document.getElementById("coinBox");

let i=0;
let anim=setInterval(()=>{

box.innerText=["🪙","🔄","🪙","🔄"][i%4];
i++;

if(i>10){
clearInterval(anim);

let r=Math.random()<0.5?"HEAD":"TAIL";
box.innerText=r;

if(r===t) add(200);
}

},80);
}

/* ================= BET (numbers only) ================= */

function bet(){

let input=document.getElementById("betInput");
input.value=input.value.replace(/[^0-9]/g,'');

let v=+input.value;

if(!v || v>State.money) return;

sub(v);

setTimeout(()=>{
if(Math.random()<0.5) add(v*2);
},500);
}

/* ================= GOLD MINE (10s hold) ================= */

let hold=false;
let time=0;
let timer=null;

const gold=document.getElementById("gold");
const mineText=document.getElementById("mineText");

gold.onmousedown=()=>{

hold=true;
time=0;

timer=setInterval(()=>{

if(!hold){
clearInterval(timer);
mineText.innerText="FAILED";
return;
}

time++;

mineText.innerText=`MINING ${(1000-time)/100}s`;

if(time>=1000){
clearInterval(timer);
add(10);
mineText.innerText="SUCCESS +10";
hold=false;
}

},10);

};

gold.onmouseup=()=>hold=false;
gold.onmouseleave=()=>hold=false;

/* ================= INIT ================= */

load();
render();

</script>

</body>
</html>
