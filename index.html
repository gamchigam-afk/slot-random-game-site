<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🎰 Casino Game</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: gold;
    font-family: Arial;
    text-align: center;
}

/* 공통 버튼 */
button {
    margin: 6px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: gold;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* 화면 */
.screen {
    display: none;
    padding-top: 40px;
}

.active {
    display: block;
}

/* 슬롯 박스 */
.slot-box {
    margin: 20px auto;
    width: 320px;
    padding: 20px;
    border: 5px solid gold;
    border-radius: 15px;
    background: #111;
    box-shadow: 0 0 20px gold;
    font-size: 60px;
    letter-spacing: 10px;
}

/* 왼쪽 메뉴 */
.side-menu {
    position: absolute;
    left: 20px;
    top: 120px;
    text-align: left;
}

/* 팝업 */
#popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 3px solid gold;
    padding: 20px;
    display: none;
    box-shadow: 0 0 20px gold;
}
</style>
</head>

<body>

<!-- 💰 돈 -->
<div id="money">💰 1000원</div>

<!-- 🌟 WELCOME -->
<div id="welcome" class="screen active">
    <h1>🎉 WELCOME TO CASINO</h1>

    <button onclick="goMode()">CHOOSE GAME MODE</button>

    <div class="side-menu">
        <button onclick="openPopup()">⚙️ 설정</button><br>
        <button onclick="openPopup()">🎮 미니게임</button><br>
        <button onclick="openPopup()">📊 확률보기</button>
    </div>
</div>

<!-- 🎮 MODE -->
<div id="mode" class="screen">
    <h2>🎮 GAME MODE</h2>

    <button onclick="openSlot()">🎰 SLOT MODE</button><br>
    <button onclick="goWelcome()">🚪 나가기</button>
</div>

<!-- 🎰 SLOT -->
<div id="slot" class="screen">
    <h2>🎰 SLOT GAME</h2>

    <div class="slot-box" id="slotBox">❓ ❓ ❓</div>

    <button onclick="spin()">SPIN (100원)</button>
    <button onclick="goMode()">🚪 나가기</button>

    <p id="result"></p>
</div>

<!-- 팝업 -->
<div id="popup">
    <h3>⏳ 아직 준비중입니다</h3>
    <button onclick="closePopup()">나가기</button>
</div>

<script>
const SAVE_KEY = "casino_money";

let money = Number(localStorage.getItem(SAVE_KEY));
if (isNaN(money)) money = 1000;

const items = ["🍒","🍋","🍇","🔔","⭐","7️⃣"];

let spinning = false;

/* 💰 돈 업데이트 */
function updateMoney(){
    document.getElementById("money").innerText = "💰 " + money + "원";
    localStorage.setItem(SAVE_KEY, money);
}
updateMoney();

/* 🎮 화면 전환 */
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goWelcome(){ showScreen("welcome"); }
function goMode(){ showScreen("mode"); }
function openSlot(){ showScreen("slot"); }

/* 🎰 슬롯 */
function spin(){
    if(spinning) return;
    if(money < 100){
        document.getElementById("result").innerText = "돈 부족 💸";
        return;
    }

    spinning = true;
    money -= 100;
    updateMoney();

    let box = document.getElementById("slotBox");
    let btns = document.querySelectorAll("button");

    document.querySelector("#slot button").disabled = true;

    document.getElementById("result").innerText = "🎰 SPINNING...";

    let interval = setInterval(()=>{
        let a = items[Math.floor(Math.random()*items.length)];
        let b = items[Math.floor(Math.random()*items.length)];
        let c = items[Math.floor(Math.random()*items.length)];
        box.innerText = `${a} ${b} ${c}`;
    }, 80);

    setTimeout(()=>{
        clearInterval(interval);

        let a = items[Math.floor(Math.random()*items.length)];
        let b = items[Math.floor(Math.random()*items.length)];
        let c = items[Math.floor(Math.random()*items.length)];

        box.innerText = `${a} ${b} ${c}`;

        if(a===b && b===c){
            money += 1000;
            document.getElementById("result").innerText = "🎉 JACKPOT!";
        } else {
            document.getElementById("result").innerText = "😢 LOSE";
        }

        updateMoney();
        spinning = false;

    }, 2000);
}

/* 팝업 */
function openPopup(){
    document.getElementById("popup").style.display = "block";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
