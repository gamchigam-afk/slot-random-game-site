<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>
body{
margin:0;
background:radial-gradient(circle,#111,#000);
color:#00ffff;
font-family:Arial;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-shadow:0 0 10px #00ffff;
}

h1{
text-shadow:0 0 20px #00ffff,0 0 40px #00ffff;
}

.screen{display:none;}
.card{
background:#111;
border:1px solid #00ffff;
color:#00ffff;
padding:10px 15px;
margin:5px;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

#moneyUI,#bestUI{
margin:5px;
}

</style>
</head>

<body>

<h1>NEON CASINO X</h1>

<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 1000</div>

<!-- SCREENS -->

<div id="welcome" class="screen" style="display:flex;">
  <div class="card" onclick="UI.go('mode')">START</div>
</div>

<div id="mode" class="screen">
  <div class="card" onclick="UI.go('slot')">🎰 SLOT</div>
  <div class="card" onclick="UI.go('coin')">🪙 COIN</div>
  <div class="card" onclick="UI.go('bet')">💰 BET</div>
  <div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
  <div class="card" onclick="UI.go('inventory')">🎒 INV</div>
</div>

<div id="slot" class="screen">
  <div class="card" onclick="spin()">SPIN</div>
  <div class="card" onclick="UI.go('mode')">BACK</div>
  <div id="slotBox">❓❓❓</div>
</div>

<div id="coin" class="screen">
  <div class="card" onclick="coinPick('HEAD')">HEAD</div>
  <div class="card" onclick="coinPick('TAIL')">TAIL</div>
  <div id="coinBox">❓</div>
  <div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<div id="bet" class="screen">
  <input id="betInput" placeholder="BET">
  <div class="card" onclick="bet()">START</div>
  <div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<div id="shop" class="screen">
  <div class="card" onclick="buy('slot')">SLOT BOOST (300)</div>
  <div class="card" onclick="buy('coin')">COIN BOOST (300)</div>
  <div class="card" onclick="buy('bet')">BET BOOST (300)</div>
  <div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<div id="inventory" class="screen">
  <div id="invBox">EMPTY</div>
  <div class="card" onclick="UI.go('mode')">BACK</div>
</div>

<!-- SOUND -->
<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="loseSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

/* ================= STATE + LOAD ================= */

const State = JSON.parse(localStorage.getItem("casino")) || {
  money:1000,
  best:1000,
  inv:[]
};

/* ================= SAVE ================= */

function save(){
  localStorage.setItem("casino",JSON.stringify(State));
}

/* ================= UI ================= */

const UI={
go(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
}
};

/* ================= RENDER ================= */

function Render(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
updateInv();
save();
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best) State.best=State.money;
Render();
}

function sub(v){
State.money-=v;
if(State.money<0) State.money=0;
Render();
}

/* ================= SHOP + EFFECT ================= */

function has(item){
return State.inv.includes(item);
}

function buy(item){
const price=300;
if(State.money<price) return;
sub(price);
State.inv.push(item);
Render();
}

/* boost */
function boost(type){
if(type==="slot") return has("slot")?1.1:1;
if(type==="coin") return has("coin")?1.1:1;
if(type==="bet") return has("bet")?1.2:1;
return 1;
}

/* ================= SLOT ================= */

function spin(){
sub(100);

const box=document.getElementById("slotBox");
const arr=["🍒","🍋","💎","7️⃣"];

let i=0;

let t=setInterval(()=>{

box.innerText=
arr[Math.random()*4|0]+" "+
arr[Math.random()*4|0]+" "+
arr[Math.random()*4|0];

i++;

if(i>20){
clearInterval(t);

if(Math.random()<0.3*boost("slot")){
box.innerText="WIN";
add(500);
winSound.play();
}else{
box.innerText="LOSE";
loseSound.play();
}
}

},70);
}

/* ================= COIN ================= */

function coinPick(type){
sub(50);

const box=document.getElementById("coinBox");

let i=0;

let t=setInterval(()=>{

box.innerText=Math.random()<0.5?"HEAD":"TAIL";

i++;

if(i>15){
clearInterval(t);

let r=Math.random()<0.5?"HEAD":"TAIL";

box.innerText=r;

if(r===type && Math.random()<0.5*boost("coin")){
add(100);
winSound.play();
}else{
loseSound.play();
}
}

},80);
}

/* ================= BET ================= */

function bet(){
let v=Number(document.getElementById("betInput").value);
if(!v||v>State.money) return;

sub(v);

setTimeout(()=>{

if(Math.random()<0.5*boost("bet")){
add(v*2);
winSound.play();
}else{
loseSound.play();
}

},700);
}

/* ================= INVENTORY ================= */

function updateInv(){
document.getElementById("invBox").innerText=
State.inv.length?State.inv.join(", "):"EMPTY";
}

/* INIT */

Render();

</script>

</body>
</html>
