<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
text-shadow:0 0 10px #00ffff;
}

/* ================= MONEY UI ================= */

#moneyUI{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:24px;
color:#00ffff;
z-index:999;
}

#bestUI{
position:fixed;
top:40px;
left:50%;
transform:translateX(-50%);
font-size:18px;
color:gold;
z-index:999;
}

/* ================= LAYOUT ================= */

#layout{
display:flex;
height:100vh;
}

/* LEFT */

#leftMenu{
width:200px;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
padding-left:10px;
}

/* CENTER */

#center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* SCREEN */

.screen{
display:none;
flex-direction:column;
align-items:center;
}

.active{
display:flex;
}

/* CARD */

.card{
padding:10px 15px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

/* SLOT */

#slotBox{
font-size:70px;
margin:20px;
}

.spinning{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- MONEY -->
<div id="moneyUI">💰 1000</div>
<div id="bestUI">🏆 1000</div>

<div id="layout">

<!-- LEFT MENU -->
<div id="leftMenu">

<div class="card" onclick="UI.go('shop')">🏪 SHOP</div>
<div class="card" onclick="UI.go('inventory')">🎒 INVENTORY</div>
<div class="card" onclick="UI.go('mini')">🎮 MINI</div>

</div>

<!-- CENTER -->
<div id="center">

<!-- WELCOME -->
<div id="welcome" class="screen active">

<h1>NEON CASINO X</h1>

<div class="card" onclick="UI.go('mode')">
CHOOSE GAME MODE
</div>

</div>

<!-- MODE -->
<div id="mode" class="screen">

<div class="card" onclick="UI.go('slot')">SLOT</div>
<div class="card" onclick="UI.go('coin')">COIN</div>
<div class="card" onclick="UI.go('bet')">BET</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- SLOT -->
<div id="slot" class="screen">

<h2>SLOT MACHINE</h2>
<div id="slotBox">❓❓❓</div>

<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- COIN -->
<div id="coin" class="screen">

<h2>COIN FLIP</h2>
<div id="coinBox">❓</div>

<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>

<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- BET -->
<div id="bet" class="screen">

<h2>BET</h2>
<input id="betInput">

<div class="card" onclick="bet()">START</div>
<div class="card" onclick="UI.go('mode')">BACK</div>

</div>

<!-- SHOP -->
<div id="shop" class="screen">

<h2>SHOP</h2>

<div class="card" onclick="buy('slot')">🎰 SLOT BOOST (2000)</div>
<div class="card" onclick="buy('coin')">🪙 COIN BOOST (2000)</div>
<div class="card" onclick="buy('bet')">💰 BET BOOST (2000)</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- INVENTORY -->
<div id="inventory" class="screen">

<h2>INVENTORY</h2>
<div id="invBox">EMPTY</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

<!-- MINI -->
<div id="mini" class="screen">

<h2>MINI GAME</h2>
<div id="miniText">WAIT...</div>

<div class="card" onclick="miniClick()">CLICK</div>

<div class="card" onclick="UI.go('welcome')">BACK</div>

</div>

</div>
</div>

<script>

/* ================= STATE ================= */

const State={
money:1000,
best:1000,
inv:[],
equip:{
slot:false,
coin:false,
bet:false
}
};

/* ================= LOAD ================= */

function load(){
const data=localStorage.getItem("casino_save");
if(!data) return;

const s=JSON.parse(data);

Object.assign(State,s);
}

/* ================= SAVE ================= */

function save(){
localStorage.setItem("casino_save",JSON.stringify(State));
}

/* ================= RENDER ================= */

function render(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
document.getElementById("invBox").innerText=State.inv.join(", ") || "EMPTY";
save();
}

load();
render();

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best) State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0) State.money=0;
render();
}

/* ================= UI ================= */

const UI={
current:"welcome",
go(id){
document.getElementById(this.current).classList.remove("active");
document.getElementById(id).classList.add("active");
this.current=id;
}
};

/* ================= SLOT ================= */

const symbols=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){

const box=document.getElementById("slotBox");

let cost=100;
if(State.equip.slot) cost=50;

sub(cost);

box.classList.add("spinning");

let count=0;

let interval=setInterval(()=>{

box.innerText=
symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)]+" "
+symbols[Math.floor(Math.random()*symbols.length)];

count++;

if(count>15){

clearInterval(interval);
box.classList.remove("spinning");

let a=symbols[Math.floor(Math.random()*symbols.length)];
let b=symbols[Math.floor(Math.random()*symbols.length)];
let c=symbols[Math.floor(Math.random()*symbols.length)];

box.innerText=`${a} ${b} ${c}`;

if(a===b && b===c){
add(State.equip.slot?1000:500);
box.innerText+=" WIN";
}
else if(a===b || b===c || a===c){
box.innerText+=" 실격";
}
else{
box.innerText+=" LOSE";
}

}

},70);

}

/* ================= COIN ================= */

function coin(t){

let r=Math.random()<0.5?"HEAD":"TAIL";

document.getElementById("coinBox").innerText=r;

if(r===t){
add(State.equip.coin?200:100);
}

}

/* ================= BET ================= */

function bet(){

let v=Number(document.getElementById("betInput").value);

if(!v||v>State.money) return;

sub(v);

setTimeout(()=>{

if(Math.random()<0.5){
add(State.equip.bet?v*3:v*2);
}

},500);

}

/* ================= SHOP + EFFECT ================= */

function buy(type){

if(State.money<2000) return;

sub(2000);

State.inv.push(type);

if(type==="slot") State.equip.slot=true;
if(type==="coin") State.equip.coin=true;
if(type==="bet") State.equip.bet=true;

render();

}

</script>

</body>
</html>
