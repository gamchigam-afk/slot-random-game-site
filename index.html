<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
background:radial-gradient(circle,#120c00,#000);
color:#ffd700;
font-family:Arial;
overflow:hidden;
}

/* ================= HUD (FIXED RIGHT TOP) ================= */

#hud{
position:fixed;
top:10px;
right:10px;
text-align:right;
font-size:14px;
z-index:1000;
}

#money,#best{
font-weight:bold;
text-shadow:0 0 10px #ffd700;
}

#log{
margin-top:8px;
font-size:12px;
color:#ffdd88;
height:40px;
overflow:hidden;
}

/* ================= LEFT MENU ================= */

#left{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:1000;
}

.btn{
padding:10px;
border:1px solid #ffd700;
background:rgba(0,0,0,0.4);
cursor:pointer;
box-shadow:0 0 10px #ffcc00;
text-align:center;
transition:0.2s;
}
.btn:hover{transform:scale(1.05);}

/* ================= CENTER SCREEN ================= */

.screen{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.active{display:flex;}

/* ================= TITLE ================= */

#title{
font-size:60px;
text-shadow:0 0 20px #ffd700;
}

#sub{
font-size:18px;
margin-top:10px;
}

/* ================= CARDS ================= */

.card{
padding:12px;
margin:8px;
border:1px solid #ffd700;
background:rgba(0,0,0,0.5);
cursor:pointer;
}

/* ================= GOLD ================= */

#gold{
font-size:100px;
cursor:pointer;
user-select:none;
transition:0.1s;
}

</style>
</head>

<body>

<!-- ================= HUD ================= -->
<div id="hud">
<div id="money">💰 50000</div>
<div id="best">🏆 50000</div>
<div id="log"></div>
</div>

<!-- ================= LEFT ================= -->
<div id="left">
<div class="btn" onclick="go('mine')">⛏ GOLD</div>
<div class="btn" onclick="go('inv')">🎒 INV</div>
<div class="btn" onclick="go('shop')">🛒 SHOP</div>
</div>

<!-- ================= MENU ================= -->
<div id="menu" class="screen active">
<div id="title">NEON CASINO X</div>
<div id="sub">MODE SELECT</div>
<div class="card" onclick="go('choose')">START</div>
</div>

<!-- ================= CHOOSE ================= -->
<div id="choose" class="screen">
<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('mine')">GOLD MINE</div>
<div class="card" onclick="go('menu')">BACK</div>
</div>

<!-- ================= SLOT ================= -->
<div id="slot" class="screen">
<div class="card" onclick="spin()" id="slotBox">SPIN</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- ================= COIN ================= -->
<div id="coin" class="screen">
<div class="card" onclick="coin('HEAD')" id="coinBox">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- ================= BET ================= -->
<div id="bet" class="screen">
<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('choose')">BACK</div>
</div>

<!-- ================= SHOP ================= -->
<div id="shop" class="screen">
<div class="card">SHOP READY</div>
<div class="card" onclick="go('menu')">BACK</div>
</div>

<!-- ================= INVENTORY ================= -->
<div id="inv" class="screen">
<div class="card">INVENTORY READY</div>
<div class="card" onclick="go('menu')">BACK</div>
</div>

<!-- ================= GOLD MINE ================= -->
<div id="mine" class="screen">
<div id="gold">🪙</div>
<div class="card" onclick="go('choose')">EXIT</div>
</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000
};

/* ================= SAVE ================= */

function save(){
localStorage.setItem("NEON",JSON.stringify(State));
}

function load(){
const d=localStorage.getItem("NEON");
if(d)Object.assign(State,JSON.parse(d));
}

/* ================= HUD LOG ================= */

function log(t){
const l=document.getElementById("log");
l.innerText=t;
setTimeout(()=>l.innerText="",1500);
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
log("+"+v);
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
log("-"+v);
}

/* ================= RENDER ================= */

function render(){
money.innerText="💰 "+State.money;
best.innerText="🏆 "+State.best;
save();
}

/* ================= SCREEN ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= SLOT (450:1) ================= */

function spin(){
sub(100);

let i=0;

let inter=setInterval(()=>{

document.getElementById("slotBox").innerText=
["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]+" "
+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)]+" "
+["🍒","🍋","⭐","7️⃣"][Math.floor(Math.random()*4)];

i++;

if(i>15){
clearInterval(inter);

let win=Math.random()<1/450;

if(win){
add(1000);
}else{
sub(200);
}

}

},70);
}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
document.getElementById("coinBox").innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;
sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= GOLD MINE ================= */

let hold=false;
let time=0;

document.getElementById("gold").onmousedown=()=>{

hold=true;
time=0;

let timer=setInterval(()=>{

if(!hold){clearInterval(timer);return;}

time++;

if(time>=1000){
clearInterval(timer);
add(10);
hold=false;
}

},10);

};

document.getElementById("gold").onmouseup=()=>hold=false;
document.getElementById("gold").onmouseleave=()=>hold=false;

/* ================= INIT ================= */

load();
render();

</script>

</body>
</html>
