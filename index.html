<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X (BETA)</title>

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* ================= TITLE ================= */

#title{
font-size:60px;
margin-top:60px;
text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
}

/* ================= MONEY ================= */

#moneyUI,#bestUI{
position:fixed;
left:50%;
transform:translateX(-50%);
}

#moneyUI{top:10px;font-size:22px;}
#bestUI{top:40px;font-size:16px;color:gold;}

/* ================= LAYOUT ================= */

#layout{
display:flex;
height:100vh;
}

/* LEFT */

#left{
width:200px;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
}

/* SCREEN */

.screen{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.active{display:flex;}

/* CARD */

.card{
padding:10px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
}

/* SLOT */

#slotBox{
font-size:70px;
margin:20px;
}

/* GOLD */

#gold{
font-size:90px;
cursor:pointer;
user-select:none;
transition:0.1s;
}

/* CLICK ANIMATION */

.shrink{
transform:scale(0.7);
}

.small{
font-size:14px;
color:gray;
}

</style>
</head>

<body>

<div id="moneyUI">💰 50000</div>
<div id="bestUI">🏆 50000</div>

<div id="title">NEON CASINO X (BETA)</div>

<div id="layout">

<!-- LEFT -->
<div id="left">

<div class="card" onclick="go('shop')">SHOP</div>
<div class="card" onclick="go('inv')">INVENTORY</div>

<!-- ❌ MINI 삭제 → ✔ GOLD MINE -->
<div class="card" onclick="go('mine')">GO TO GOLD MINE</div>

</div>

<!-- WELCOME -->
<div id="welcome" class="screen active">
<div class="card" onclick="go('mode')">CHOOSE GAME MODE</div>
</div>

<!-- MODE -->
<div id="mode" class="screen">
<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('mine')">GO TO GOLD MINE</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="small" id="slotFail"></div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">

<div class="card" onclick="buy('slot')">SLOT ITEM - 30000</div>
<div class="card" onclick="buy('coin')">COIN ITEM - 30000</div>
<div class="card" onclick="buy('bet')">BET ITEM - 30000</div>

<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- INVENTORY -->
<div id="inv" class="screen">
<div id="invBox">EMPTY</div>
<div class="card" onclick="equip()">EQUIP</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- GOLD MINE -->
<div id="mine" class="screen">

<h2>⛏️ GOLD MINE</h2>

<div id="gold">🪙</div>

<div id="mineText">CLICK GOLD</div>

<div class="card" onclick="go('welcome')">BACK</div>

</div>

</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000,
inv:[],
selected:null,
equip:{slot:false,coin:false,bet:false}
};

/* ================= SAVE ================= */

function save(){
localStorage.setItem("NEON",JSON.stringify(State));
}

function load(){
let d=localStorage.getItem("NEON");
if(d)Object.assign(State,JSON.parse(d));
}

/* ================= UI ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
}

function render(){
moneyUI.innerText="💰 "+State.money;
bestUI.innerText="🏆 "+State.best;
invBox.innerText=State.inv.join(", ")||"EMPTY";
save();
}

load();
render();

/* ================= SLOT ================= */

const sym=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){

sub(100);

let box=slotBox;
let i=0;

let inter=setInterval(()=>{

box.innerText=
sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)];

i++;

if(i>15){
clearInterval(inter);

let a=sym[Math.floor(Math.random()*5)];
let b=sym[Math.floor(Math.random()*5)];
let c=sym[Math.floor(Math.random()*5)];

box.innerText=`${a} ${b} ${c}`;

if(a===b&&b===c){
add(1000);
slotFail.innerText="";
}
else{
slotFail.innerText="FAIL";
sub(200);
}

}

},70);

}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
coinBox.innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;
sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= SHOP ================= */

function buy(x){
if(State.money<30000)return;
sub(30000);
State.inv.push(x);
render();
}

/* ================= INVENTORY ================= */

function equip(){
State.selected=State.inv[State.inv.length-1];
save();
}

/* ================= GOLD MINE ================= */

const gold=document.getElementById("gold");

gold.onclick=()=>{
if(State.money<=0) return;

/* 클릭 애니메이션 */
gold.classList.add("shrink");

setTimeout(()=>{
gold.classList.remove("shrink");
},100);

/* 돈 지급 */
add(10);

mineText.innerText="MINING +10";
};

</script>

</body>
</html>
