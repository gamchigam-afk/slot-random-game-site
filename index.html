<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

/* ================= BACKGROUND ================= */

body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffff;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle,#00ffff22 1px,transparent 1px),
radial-gradient(circle,#ff00ff22 1px,transparent 1px);
background-size:60px 60px,90px 90px;
animation:bgMove 12s linear infinite;
z-index:0;
}

@keyframes bgMove{
0%{transform:translateY(0);}
100%{transform:translateY(-120px);}
}

/* ================= TITLE ================= */

#title{
text-align:center;
font-size:64px;
margin-top:80px;
text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
position:relative;
z-index:5;
}

/* ================= MONEY UI ================= */

#moneyUI,#bestUI{
position:fixed;
left:50%;
transform:translateX(-50%);
z-index:10;
}

#moneyUI{top:10px;font-size:22px;}
#bestUI{top:40px;font-size:16px;color:gold;}

/* ================= LAYOUT ================= */

#layout{
display:flex;
height:100vh;
position:relative;
z-index:2;
}

/* ================= LEFT ================= */

#leftMenu{
width:200px;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
padding-left:10px;
}

/* ================= CENTER ================= */

#center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* ================= SCREENS (FIXED) ================= */

.screen{
position:absolute;
top:0;
left:200px;
right:0;
bottom:0;

display:none;
flex-direction:column;
align-items:center;
justify-content:center;

z-index:3;
}

.screen.active{
display:flex;
}

/* ================= CARD ================= */

.card{
padding:10px 15px;
margin:6px;
border:1px solid #00ffff;
cursor:pointer;
box-shadow:0 0 10px #00ffff;
transition:.2s;
user-select:none;
z-index:10;
}

.card:hover{
transform:scale(1.05);
}

/* ================= SLOT ================= */

#slotBox{
font-size:70px;
margin:20px;
}

</style>
</head>

<body>

<div id="moneyUI">💰 50000</div>
<div id="bestUI">🏆 50000</div>

<div id="title">NEON CASINO X</div>

<div id="layout">

<!-- LEFT -->
<div id="leftMenu">

<div class="card" onclick="go('shop')">🏪 SHOP</div>
<div class="card" onclick="go('inv')">🎒 INVENTORY</div>
<div class="card" onclick="go('mini')">🎮 MINI</div>

</div>

<!-- WELCOME -->
<div id="welcome" class="screen active">
<div class="card" onclick="go('mode')">CHOOSE GAME MODE</div>
</div>

<!-- MODE -->
<div id="mode" class="screen">
<div class="card" onclick="go('slot')">SLOT</div>
<div class="card" onclick="go('coin')">COIN</div>
<div class="card" onclick="go('bet')">BET</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN</div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div id="coinBox">❓</div>
<div class="card" onclick="coin('HEAD')">HEAD</div>
<div class="card" onclick="coin('TAIL')">TAIL</div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betInput">
<div class="card" onclick="bet()">START</div>
<div class="card" onclick="go('mode')">BACK</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="card" onclick="buy('slot')">Slot Boost</div>
<div class="card" onclick="buy('coin')">Coin Boost</div>
<div class="card" onclick="buy('bet')">Bet Boost</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- INVENTORY -->
<div id="inv" class="screen">
<div id="invBox">EMPTY</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

<!-- MINI -->
<div id="mini" class="screen">
<div class="card">MINI GAME (WIP)</div>
<div class="card" onclick="go('welcome')">BACK</div>
</div>

</div>

<script>

/* ================= STATE ================= */

const State={
money:50000,
best:50000,
inv:[],
equip:{slot:false,coin:false,bet:false}
};

/* ================= LOAD / SAVE ================= */

function save(){
localStorage.setItem("NEON_CASINO",JSON.stringify(State));
}

function load(){
let d=localStorage.getItem("NEON_CASINO");
if(d)Object.assign(State,JSON.parse(d));
}

/* ================= UI FIX ================= */

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ================= RENDER ================= */

function render(){
document.getElementById("moneyUI").innerText="💰 "+State.money;
document.getElementById("bestUI").innerText="🏆 "+State.best;
document.getElementById("invBox").innerText=State.inv.join(", ")||"EMPTY";
save();
}

/* ================= MONEY ================= */

function add(v){
State.money+=v;
if(State.money>State.best)State.best=State.money;
render();
}

function sub(v){
State.money-=v;
if(State.money<0)State.money=0;
render();
}

/* ================= SLOT ================= */

const sym=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){

sub(100);

let box=document.getElementById("slotBox");

let i=0;

let inter=setInterval(()=>{

box.innerText=
sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)]+" "
+sym[Math.floor(Math.random()*5)];

i++;

if(i>15){
clearInterval(inter);

let a=sym[Math.floor(Math.random()*5)];
let b=sym[Math.floor(Math.random()*5)];
let c=sym[Math.floor(Math.random()*5)];

box.innerText=`${a} ${b} ${c}`;

if(a===b&&b===c){
add(1000);
}
else if(a===b||b===c||a===c){
box.innerText+=" 실격";
}
else{
sub(200);
}

}

},70);

}

/* ================= COIN ================= */

function coin(t){
let r=Math.random()<0.5?"HEAD":"TAIL";
document.getElementById("coinBox").innerText=r;
if(r===t)add(200);
}

/* ================= BET ================= */

function bet(){
let v=+betInput.value;
if(v>State.money)return;
sub(v);
setTimeout(()=>Math.random()<0.5?add(v*2):0,500);
}

/* ================= SHOP ================= */

function buy(x){
if(State.money<2000)return;
sub(2000);
State.inv.push(x);

if(x==="slot")State.equip.slot=true;
if(x==="coin")State.equip.coin=true;
if(x==="bet")State.equip.bet=true;

render();
}

/* ================= START ================= */

load();
render();

</script>

</body>
</html>
