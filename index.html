<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CASINO X</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle,#222,#000);
    overflow:hidden;
}

.card{
    background:gold;
    color:black;
    padding:10px;
    margin:8px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.screen{display:none;}
.active{display:flex;}

#center{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.slot-box{
    font-size:60px;
    color:gold;
    background:#111;
    padding:20px;
    border-radius:15px;
}

.coin{font-size:80px;color:gold;}

.yellow{color:gold;}

#moneyFX{
    position:fixed;
    top:20px;
    right:20px;
    color:white;
}

.fx{
    animation:up 1s forwards;
}

@keyframes up{
    0%{opacity:1;transform:translateY(0);}
    100%{opacity:0;transform:translateY(-20px);}
}

.plus{color:lime;}
.minus{color:red;}

</style>
</head>

<body>

<div id="moneyFX"></div>

<div id="center">

<!-- WELCOME -->
<div id="welcome" class="screen active">
<h1 style="color:gold;">NEON CASINO X</h1>
<div class="card" onclick="goMode()">CHOOSE MODE</div>
</div>

<!-- MODE -->
<div id="mode" class="screen">

<div class="card" onclick="openSlot()">🎰 SLOT</div>
<div class="card" onclick="openCoin()">🪙 COIN</div>
<div class="card" onclick="openBet()">💰 BET</div>

<div class="card yellow" onclick="openInventory()">🎒 INVENTORY</div>
<div class="card yellow" onclick="openShop()">🏪 SHOP</div>
<div class="card yellow" onclick="openMini()">🎮 MINI</div>

<div class="card" onclick="goWelcome()">BACK</div>

</div>

<!-- SLOT -->
<div id="slot" class="screen">
<div class="slot-box" id="slotBox">❓❓❓</div>
<div class="card" onclick="spin()">SPIN (100)</div>
<div class="card" onclick="goMode()">BACK</div>
</div>

<!-- COIN -->
<div id="coin" class="screen">
<div class="coin" id="coinFace">❓</div>
<div class="card" onclick="flip('HEAD')">HEAD</div>
<div class="card" onclick="flip('TAIL')">TAIL</div>
<div class="card" onclick="goMode()">BACK</div>
</div>

<!-- BET -->
<div id="bet" class="screen">
<input id="betAmount">
<div class="card" onclick="playBet()">START</div>
<div class="card" onclick="goMode()">BACK</div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="card">🎰 SLOT +3% / 2000</div>
<div class="card">🪙 COIN +3% / 2000</div>
<div class="card">💰 BET +3% / 2000</div>
<div class="card" onclick="goMode()">BACK</div>
</div>

<!-- INVENTORY -->
<div id="inventory" class="screen">
<div id="invList"></div>
<div class="card" onclick="goMode()">BACK</div>
</div>

<!-- MINI -->
<div id="mini" class="screen">
<h1 id="miniText">WAIT...</h1>
<div class="card" onclick="pressMini()">CLICK</div>
<div class="card" onclick="goMode()">BACK</div>
</div>

</div>

<script>

let money=1000;
let best=0;

let inventory=[];
let equipped={};

let canPress=false;

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goWelcome(){show("welcome");}
function goMode(){show("mode");}

/* MONEY FX */
function fx(v){
let box=document.getElementById("moneyFX");
let d=document.createElement("div");
d.className="fx "+(v>=0?"plus":"minus");
d.innerText=(v>=0?"+":"")+v;
box.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

/* MONEY SYSTEM */
function add(v){money+=v;fx(v);update();}
function sub(v){money-=v;fx(-v);update();}

/* SLOT */
function openSlot(){show("slot");}

function spin(){
if(money<100) return;
sub(100);

let bonus=e.quipped?.slot?0.03:0;

let box=document.getElementById("slotBox");
let arr=["🍒","🍋","🍇","💎","7️⃣"];

let anim=setInterval(()=>{
box.innerText=arr[Math.random()*5|0]+" "+arr[Math.random()*5|0]+" "+arr[Math.random()*5|0];
},80);

setTimeout(()=>{
clearInterval(anim);

if(Math.random()<0.03+bonus) add(1000);

},1500);
}

/* COIN */
function openCoin(){show("coin");}

function flip(c){
if(money<50) return;
sub(50);

let bonus=e.quipped?.coin?0.03:0;

let face=document.getElementById("coinFace");

let anim=setInterval(()=>{
face.innerText=Math.random()<0.5?"HEAD":"TAIL";
},80);

setTimeout(()=>{
clearInterval(anim);

let r=Math.random()<0.5+bonus?"HEAD":"TAIL";
face.innerText=r;

if(c===r) add(100);

},1200);
}

/* BET */
function playBet(){
let b=Number(betAmount.value);
if(b>money) return;

sub(b);

let bonus=e.quipped?.bet?0.03:0;

setTimeout(()=>{
if(Math.random()<0.5+bonus) add(b*2);
},800);
}

/* INVENTORY */
function openInventory(){
show("inventory");

let box=document.getElementById("invList");
box.innerHTML="";

inventory.forEach((i,idx)=>{

let d=document.createElement("div");
d.className="card";
d.innerText=i+" 장착";

d.onclick=()=>{
equipped[i]=true;
inventory.splice(idx,1);
openInventory();
};

box.appendChild(d);
});
}

/* MINI GAME (REWORK) */
function openMini(){
show("mini");
startMini();
}

let startTime=0;

function startMini(){
canPress=false;
miniText.innerText="WAIT...";
setTimeout(()=>{
miniText.innerText="CLICK!";
startTime=Date.now();
canPress=true;
},Math.random()*2000+1000);
}

function pressMini(){

if(!canPress) return;

let t=(Date.now()-startTime)/1000;

if(t<0){
alert("실격");
return;
}

if(t<=0.2) add(100);
else if(t<=0.5) add(50);
else add(0);

startMini();
}

/* UPDATE */
function update(){
best=Math.max(best,money);
moneyEl.innerText="💰 "+money;
bestScore.innerText="🏆 "+best;
}

update();

</script>

</body>
</html>
